                    starsCtx.fillStyle = `rgba(255, ${150 + i * 15}, ${50 + i * 10}, ${alpha * fade * 0.5})`;
                    starsCtx.beginPath();
                    starsCtx.arc(tp.x, tp.y, (1.2 - i * 0.1) * dpr, 0, Math.PI * 2);
                    starsCtx.fill();
                }
            }

            // Engine flicker
            const flickerAlpha = alpha * (0.3 + 0.4 * Math.random());
            starsCtx.fillStyle = `rgba(255, 200, 80, ${flickerAlpha})`;
            starsCtx.beginPath();
            starsCtx.arc(p.x, p.y, 2.2 * dpr, 0, Math.PI * 2);
            starsCtx.fill();
        }

        // ── Derelict Ship — dim tumbling dot drifting through empty space ──
        function drawDerelictShip(now, w, h, isDark, viewRotX, viewRotY) {
            if (!isDark) return;
            // Slow drift
            derelictShip.theta += derelictShip.dTheta;
            derelictShip.phi += derelictShip.dPhi;
            if (derelictShip.phi < 0.3) derelictShip.dPhi = Math.abs(derelictShip.dPhi);
            if (derelictShip.phi > Math.PI - 0.3) derelictShip.dPhi = -Math.abs(derelictShip.dPhi);

            const p = projectStar(derelictShip, derelictShip.layerSpeed, viewRotX, viewRotY);
            if (!p || isOccludedByHole(p.x, p.y)) { derelictScreenPos = null; return; }
            const dpr = window.devicePixelRatio;
            derelictScreenPos = { x: p.x, y: p.y };

            // Tumbling — brightness varies as it rotates
            const tumble = 0.3 + 0.3 * Math.sin(now * 0.0008 + derelictShip.tumblePhase)
                               * Math.sin(now * 0.0013 + derelictShip.tumblePhase * 1.6);

            // Dim hull — grayish, no engine glow
            starsCtx.fillStyle = `rgba(150, 150, 160, ${tumble})`;
            starsCtx.beginPath();
            starsCtx.arc(p.x, p.y, 1.3 * dpr, 0, Math.PI * 2);
            starsCtx.fill();

            // Occasional glint — reflected starlight off hull (every ~5s, brief)
            const glintCycle = now % 5000;
            if (glintCycle < 120) {
                const glintAlpha = (1 - glintCycle / 120) * 0.6;
                starsCtx.fillStyle = `rgba(255, 255, 255, ${glintAlpha})`;
                starsCtx.beginPath();
                starsCtx.arc(p.x, p.y, 2.0 * dpr, 0, Math.PI * 2);
                starsCtx.fill();
            }
        }

        // ── Cryosleep Pod — lone occupant drifting through deep space ──
        function drawCryoPod(now, w, h, isDark, viewRotX, viewRotY) {
            if (!isDark) return;
            cryoPod.theta += cryoPod.dTheta;
            cryoPod.phi += cryoPod.dPhi;
            if (cryoPod.phi < 0.3) cryoPod.dPhi = Math.abs(cryoPod.dPhi);
            if (cryoPod.phi > Math.PI - 0.3) cryoPod.dPhi = -Math.abs(cryoPod.dPhi);

            const p = projectStar(cryoPod, cryoPod.layerSpeed, viewRotX, viewRotY);
            if (!p || isOccludedByHole(p.x, p.y)) { cryoPodScreenPos = null; return; }
            const dpr = window.devicePixelRatio;
            cryoPodScreenPos = { x: p.x, y: p.y };

            // Faint blue-white pod
            const pulse = 0.5 + 0.15 * Math.sin(now * 0.001);
            starsCtx.fillStyle = `rgba(160, 200, 255, ${pulse})`;
            starsCtx.beginPath();
            starsCtx.arc(p.x, p.y, 1.2 * dpr, 0, Math.PI * 2);
            starsCtx.fill();

            // Cryo glow — cold blue aura
            starsCtx.fillStyle = `rgba(100, 160, 255, ${pulse * 0.15})`;
            starsCtx.beginPath();
            starsCtx.arc(p.x, p.y, 4 * dpr, 0, Math.PI * 2);
            starsCtx.fill();

            // Heartbeat blink — brief bright flash every 3s
            const heartbeat = now % 3000;
            if (heartbeat < 80) {
                const hbAlpha = (1 - heartbeat / 80) * 0.7;
                starsCtx.fillStyle = `rgba(180, 220, 255, ${hbAlpha})`;
                starsCtx.beginPath();
                starsCtx.arc(p.x, p.y, 2.5 * dpr, 0, Math.PI * 2);
                starsCtx.fill();
            } else if (heartbeat > 200 && heartbeat < 280) {
                const hbAlpha = (1 - (heartbeat - 200) / 80) * 0.4;
                starsCtx.fillStyle = `rgba(180, 220, 255, ${hbAlpha})`;
                starsCtx.beginPath();
                starsCtx.arc(p.x, p.y, 2 * dpr, 0, Math.PI * 2);
                starsCtx.fill();
            }
        }

        // ── Terraform in Progress — star shifting color red→blue→green ──
        function drawTerraform(now, w, h, isDark, viewRotX, viewRotY) {
            if (!isDark || !terraformStar) return;
            const star = starLayers[terraformStar.layerIdx].stars[terraformStar.starIdx];
            if (!star || star.dead) return;
            const p = projectStar(star, starLayers[terraformStar.layerIdx].speed, viewRotX, viewRotY);
            if (!p || isOccludedByHole(p.x, p.y)) { terraformScreenPos = null; return; }
            const dpr = window.devicePixelRatio;
            terraformScreenPos = { x: p.x, y: p.y };

            // Color cycle: red → orange → blue → cyan → green (over ~3 minutes)
            const cycle = (now * 0.0001) % 1; // full cycle ~100s
            let r, g, b;
            if (cycle < 0.25) {
                const t = cycle / 0.25;
                r = 220 - t * 100; g = 80 + t * 40; b = 60 + t * 140;
            } else if (cycle < 0.5) {
                const t = (cycle - 0.25) / 0.25;
                r = 120 - t * 80; g = 120 + t * 60; b = 200 + t * 40;
            } else if (cycle < 0.75) {
                const t = (cycle - 0.5) / 0.25;
                r = 40 + t * 20; g = 180 + t * 60; b = 240 - t * 120;
            } else {
                const t = (cycle - 0.75) / 0.25;
                r = 60 + t * 160; g = 240 - t * 80; b = 120 - t * 60;
            }

            // Main star
            starsCtx.fillStyle = `rgba(${r|0}, ${g|0}, ${b|0}, 0.8)`;
            starsCtx.beginPath();
            starsCtx.arc(p.x, p.y, 2.0 * dpr, 0, Math.PI * 2);
            starsCtx.fill();

            // Atmospheric haze
            starsCtx.fillStyle = `rgba(${r|0}, ${g|0}, ${b|0}, 0.1)`;
            starsCtx.beginPath();
            starsCtx.arc(p.x, p.y, 5 * dpr, 0, Math.PI * 2);
            starsCtx.fill();

            // Tiny orbiting construction satellites
            for (let i = 0; i < 3; i++) {
                const sa = now * 0.002 + (i / 3) * Math.PI * 2;
                const sr = 6 * dpr;
                starsCtx.fillStyle = `rgba(255, 255, 200, 0.35)`;
                starsCtx.beginPath();
                starsCtx.arc(p.x + Math.cos(sa) * sr, p.y + Math.sin(sa) * sr * 0.4, 0.4 * dpr, 0, Math.PI * 2);
                starsCtx.fill();
            }
        }

        // ── Galactic Lighthouse — beacon with sweeping beam ──
        function drawLighthouse(now, w, h, isDark, viewRotX, viewRotY) {
            if (!isDark || !lighthouseStar) return;
            const star = starLayers[lighthouseStar.layerIdx].stars[lighthouseStar.starIdx];
            if (!star || star.dead) return;
            const p = projectStar(star, starLayers[lighthouseStar.layerIdx].speed, viewRotX, viewRotY);
            if (!p || isOccludedByHole(p.x, p.y)) { lighthouseScreenPos = null; return; }
            const dpr = window.devicePixelRatio;
            lighthouseScreenPos = { x: p.x, y: p.y };

            // Central beacon — bright pulse synced with beam
            const beamAngle = now * 0.0047; // ~1.33s cycle
            const beamPulse = Math.pow(Math.max(0, Math.cos(beamAngle)), 8);
            const coreBright = 0.5 + beamPulse * 0.5;

            starsCtx.fillStyle = `rgba(255, 255, 240, ${coreBright})`;
            starsCtx.beginPath();
            starsCtx.arc(p.x, p.y, (1.5 + beamPulse * 0.8) * dpr, 0, Math.PI * 2);
            starsCtx.fill();

            // Sweeping beam — two opposite beams rotating
            const beamLen = 20 * dpr;
            for (let side = 0; side < 2; side++) {
                const angle = beamAngle + side * Math.PI;
                const bx = Math.cos(angle) * beamLen;
                const by = Math.sin(angle) * beamLen;
                const grad = starsCtx.createLinearGradient(p.x, p.y, p.x + bx, p.y + by);
                grad.addColorStop(0, `rgba(255, 255, 220, ${0.4 * coreBright})`);
                grad.addColorStop(0.4, `rgba(255, 255, 200, ${0.15 * coreBright})`);
                grad.addColorStop(1, `rgba(255, 255, 200, 0)`);
                starsCtx.strokeStyle = grad;
                starsCtx.lineWidth = (1.5 - side * 0.3) * dpr;
                starsCtx.beginPath();
                starsCtx.moveTo(p.x, p.y);
                starsCtx.lineTo(p.x + bx, p.y + by);
                starsCtx.stroke();
            }

            // Pulse ring on beat
            if (beamPulse > 0.3) {
                const ringR = (3 + (1 - beamPulse) * 8) * dpr;
                starsCtx.strokeStyle = `rgba(255, 255, 220, ${beamPulse * 0.15})`;
                starsCtx.lineWidth = 0.5 * dpr;
                starsCtx.beginPath();
                starsCtx.arc(p.x, p.y, ringR, 0, Math.PI * 2);
                starsCtx.stroke();
            }
        }

        // ── Dyson Sphere Under Construction — irregularly flickering, gradually dimming ──
        function drawDysonBuild(now, w, h, isDark, viewRotX, viewRotY) {
            if (!isDark || !dysonBuildStar) return;
            const star = starLayers[dysonBuildStar.layerIdx].stars[dysonBuildStar.starIdx];
            if (!star || star.dead) return;
            const p = projectStar(star, starLayers[dysonBuildStar.layerIdx].speed, viewRotX, viewRotY);
            if (!p || isOccludedByHole(p.x, p.y)) { dysonBuildScreenPos = null; return; }
            const dpr = window.devicePixelRatio;
            dysonBuildScreenPos = { x: p.x, y: p.y };

            // Gradual dimming over the session
            dysonBuildDimming = Math.min(0.5, dysonBuildDimming + 0.000001);

            // Irregular flickering — Tabby's Star style dips
            const flicker1 = Math.sin(now * 0.0017) * Math.sin(now * 0.0031 + 1.2);
            const flicker2 = Math.sin(now * 0.0007 + 2.5) > 0.7 ? 0.3 : 0; // sudden dips
            const flicker3 = Math.sin(now * 0.013) > 0.95 ? 0.4 : 0; // brief deep dips
            const brightness = Math.max(0.15, (0.85 - dysonBuildDimming) - flicker1 * 0.15 - flicker2 - flicker3);

            // Star — yellowish, variable brightness
            starsCtx.fillStyle = `rgba(255, 240, 200, ${brightness})`;
            starsCtx.beginPath();
            starsCtx.arc(p.x, p.y, 2.0 * dpr, 0, Math.PI * 2);
            starsCtx.fill();

            // Faint construction arcs — partial rings being built
            const arcCount = 3;
            for (let i = 0; i < arcCount; i++) {
                const arcAngle = now * 0.0003 + (i / arcCount) * Math.PI * 2;
                const arcR = (5 + i * 1.5) * dpr;
                const arcLen = 0.4 + Math.sin(now * 0.001 + i) * 0.2;
                starsCtx.strokeStyle = `rgba(200, 180, 140, ${0.15 * brightness})`;
                starsCtx.lineWidth = 0.5 * dpr;
                starsCtx.beginPath();
                starsCtx.arc(p.x, p.y, arcR, arcAngle, arcAngle + arcLen);
                starsCtx.stroke();
            }

            // Occasional construction flash
            const flashCycle = now % 4500;
            if (flashCycle < 100) {
                const flashAlpha = (1 - flashCycle / 100) * 0.5;
                const flashAngle = Math.floor(now / 4500) * 1.7;
                const flashDist = 5 * dpr;
                starsCtx.fillStyle = `rgba(255, 220, 140, ${flashAlpha})`;
                starsCtx.beginPath();
                starsCtx.arc(p.x + Math.cos(flashAngle) * flashDist, p.y + Math.sin(flashAngle) * flashDist, 1 * dpr, 0, Math.PI * 2);
                starsCtx.fill();
            }
        }

        // ── War Remnant — cluster of dim debris dots ──
        function drawWarRemnant(now, w, h, isDark, viewRotX, viewRotY) {
            if (!isDark || !warRemnantStar) return;
            const star = starLayers[warRemnantStar.layerIdx].stars[warRemnantStar.starIdx];
            if (!star || star.dead) return;
            const p = projectStar(star, starLayers[warRemnantStar.layerIdx].speed, viewRotX, viewRotY);
            if (!p || isOccludedByHole(p.x, p.y)) { warRemnantScreenPos = null; return; }
            const dpr = window.devicePixelRatio;
            warRemnantScreenPos = { x: p.x, y: p.y };

            // Scattered debris — 12 dim dots in a loose cluster
            const debrisCount = 12;
            for (let i = 0; i < debrisCount; i++) {
                // Fixed positions (seeded by index) with very slow tumble
                const seed1 = Math.sin(i * 127.1 + 311.7);
                const seed2 = Math.cos(i * 269.5 + 183.3);
                const spread = 10 * dpr;
                const dx = seed1 * spread + Math.sin(now * 0.00015 + i) * 1.5 * dpr;
                const dy = seed2 * spread * 0.6 + Math.cos(now * 0.00012 + i * 1.3) * 1 * dpr;

                // Varying dim colors — grays, dull reds, dark browns
                const shade = 80 + Math.abs(seed1) * 60;
                const redTint = i % 3 === 0 ? 30 : 0;
                const alpha = 0.2 + Math.abs(seed2) * 0.25;

                starsCtx.fillStyle = `rgba(${shade + redTint|0}, ${shade * 0.85|0}, ${shade * 0.8|0}, ${alpha})`;
                starsCtx.beginPath();
                starsCtx.arc(p.x + dx, p.y + dy, (0.4 + Math.abs(seed1) * 0.5) * dpr, 0, Math.PI * 2);
                starsCtx.fill();
            }

            // Faint residual radiation glow at center
            const radGlow = 0.06 + 0.03 * Math.sin(now * 0.0008);
            starsCtx.fillStyle = `rgba(180, 100, 80, ${radGlow})`;
            starsCtx.beginPath();
            starsCtx.arc(p.x, p.y, 6 * dpr, 0, Math.PI * 2);
            starsCtx.fill();
        }

        // ── Interstellar Highway — dotted line with moving vessels ──
        function drawInterstellarHighway(now, w, h, isDark, viewRotX, viewRotY) {
            if (!isDark || !highwayStar1 || !highwayStar2) return;
            const s1 = starLayers[highwayStar1.layerIdx].stars[highwayStar1.starIdx];
            const s2 = starLayers[highwayStar2.layerIdx].stars[highwayStar2.starIdx];
            if (!s1 || !s2 || s1.dead || s2.dead) return;
            const p1 = projectStar(s1, starLayers[highwayStar1.layerIdx].speed, viewRotX, viewRotY);
            const p2 = projectStar(s2, starLayers[highwayStar2.layerIdx].speed, viewRotX, viewRotY);
            if (!p1 || !p2) { highwayScreenPos = null; return; }
            if (isOccludedByHole(p1.x, p1.y) && isOccludedByHole(p2.x, p2.y)) { highwayScreenPos = null; return; }
            const dpr = window.devicePixelRatio;
            highwayScreenPos = { x: (p1.x + p2.x) / 2, y: (p1.y + p2.y) / 2 };
            // Dotted line
            const dx = p2.x - p1.x, dy = p2.y - p1.y;
            const dist = Math.sqrt(dx * dx + dy * dy);
            const dots = Math.floor(dist / (6 * dpr));
            for (let i = 0; i <= dots; i++) {
                const t = i / dots;
                const x = p1.x + dx * t, y = p1.y + dy * t;
                if (isOccludedByHole(x, y)) continue;
                starsCtx.fillStyle = `rgba(200, 200, 220, 0.15)`;
                starsCtx.beginPath();
                starsCtx.arc(x, y, 0.4 * dpr, 0, Math.PI * 2);
                starsCtx.fill();
            }
            // Moving vessels (12 ships)
            for (let i = 0; i < 12; i++) {
                const t = ((now * 0.00003 + i / 12) % 1);
                const x = p1.x + dx * t, y = p1.y + dy * t;
                if (isOccludedByHole(x, y)) continue;
                starsCtx.fillStyle = `rgba(220, 220, 255, 0.5)`;
                starsCtx.beginPath();
                starsCtx.arc(x, y, 0.6 * dpr, 0, Math.PI * 2);
                starsCtx.fill();
            }
        }

        // ── Phantom Fleet — brief appearing/disappearing formation ──
        function updatePhantomFleet(now, w, h, isDark, viewRotX, viewRotY) {
            if (!isDark) return;
            if (!phantomFleet && now > phantomNextSpawn) {
                const anchor = pickRandomVisibleStar(viewRotX, viewRotY);
                if (anchor) {
                    phantomFleet = { theta: anchor.star.theta, phi: anchor.star.phi, layerSpeed: starLayers[anchor.layerIdx].speed,
                        born: now, duration: 6000 + Math.random() * 4000, ships: 5 };
                }
            }
            if (!phantomFleet) { phantomScreenPos = null; return; }
            const age = now - phantomFleet.born;
            if (age > phantomFleet.duration) { phantomFleet = null; phantomScreenPos = null; phantomNextSpawn = now + 50000 + Math.random() * 60000; return; }
            const dpr = window.devicePixelRatio;
            const fadeIn = Math.min(1, age / 1500);
            const fadeOut = Math.min(1, (phantomFleet.duration - age) / 1500);
            const alpha = fadeIn * fadeOut * 0.5;
            const p = projectStar(phantomFleet, phantomFleet.layerSpeed, viewRotX, viewRotY);
            if (!p || isOccludedByHole(p.x, p.y)) { phantomScreenPos = null; return; }
            phantomScreenPos = { x: p.x, y: p.y };
            for (let i = 0; i < phantomFleet.ships; i++) {
                const fx = p.x + (i - 2) * 5 * dpr + Math.sin(now * 0.002 + i) * 2 * dpr;
                const fy = p.y + Math.abs(i - 2) * 3 * dpr;
                starsCtx.fillStyle = `rgba(180, 200, 255, ${alpha})`;
                starsCtx.beginPath();
                starsCtx.arc(fx, fy, 0.8 * dpr, 0, Math.PI * 2);
                starsCtx.fill();
                // Ghostly glow
                starsCtx.fillStyle = `rgba(150, 180, 255, ${alpha * 0.2})`;
                starsCtx.beginPath();
                starsCtx.arc(fx, fy, 2.5 * dpr, 0, Math.PI * 2);
                starsCtx.fill();
            }
        }

        // ── Solar Flare — star dramatically brightens with shockwave ring ──
        function updateSolarFlares(now, w, h, isDark, viewRotX, viewRotY) {
            if (!isDark) return;
            if (now > nextFlareTime) {
                const star = pickRandomVisibleStar(viewRotX, viewRotY);
                if (star) {
                    solarFlares.push({ theta: star.star.theta, phi: star.star.phi, layerSpeed: starLayers[star.layerIdx].speed,
                        born: now, duration: 4000 + Math.random() * 2000 });
                }
                nextFlareTime = now + 20000 + Math.random() * 30000;
            }
            const dpr = window.devicePixelRatio;
            for (let i = solarFlares.length - 1; i >= 0; i--) {
                const f = solarFlares[i];
                const age = now - f.born;
                if (age > f.duration) { solarFlares.splice(i, 1); continue; }
                const p = projectStar(f, f.layerSpeed, viewRotX, viewRotY);
                if (!p || isOccludedByHole(p.x, p.y)) continue;
                const t = age / f.duration;
                const brightness = t < 0.15 ? t / 0.15 : Math.pow(1 - (t - 0.15) / 0.85, 2);
                // Bright core
                starsCtx.fillStyle = `rgba(255, 250, 220, ${brightness * 0.9})`;
                starsCtx.beginPath();
                starsCtx.arc(p.x, p.y, (2 + brightness * 4) * dpr, 0, Math.PI * 2);
                starsCtx.fill();
                // Shockwave ring
                const ringR = (5 + t * 25) * dpr;
                const ringAlpha = brightness * 0.3 * (1 - t);
                starsCtx.strokeStyle = `rgba(255, 240, 200, ${ringAlpha})`;
                starsCtx.lineWidth = (1 + (1 - t) * 1.5) * dpr;
                starsCtx.beginPath();
                starsCtx.arc(p.x, p.y, ringR, 0, Math.PI * 2);
                starsCtx.stroke();
            }
        }

        // ── Comet — bright dot with long curved tail ──
        function updateComet(now, w, h, isDark, viewRotX, viewRotY) {
            if (!isDark) return;
            if (!comet && now > cometNextSpawn) {
                const startAngle = Math.random() * Math.PI * 2;
                comet = { theta: startAngle, phi: 0.5 + Math.random() * 2, dTheta: 0.0003 * (Math.random() > 0.5 ? 1 : -1),
                    dPhi: 0.0001 * (Math.random() > 0.5 ? 1 : -1), layerSpeed: 1.15, born: now, duration: 30000 + Math.random() * 15000, trail: [] };
            }
            if (!comet) { cometScreenPos = null; return; }
            const age = now - comet.born;
            if (age > comet.duration) { comet = null; cometScreenPos = null; cometNextSpawn = now + 40000 + Math.random() * 40000; return; }
            comet.theta += comet.dTheta;
            comet.phi += comet.dPhi;
            if (comet.phi < 0.3 || comet.phi > Math.PI - 0.3) comet.dPhi *= -1;
            const dpr = window.devicePixelRatio;
            const p = projectStar(comet, comet.layerSpeed, viewRotX, viewRotY);
            if (!p || isOccludedByHole(p.x, p.y)) { cometScreenPos = null; return; }
            cometScreenPos = { x: p.x, y: p.y };
            // Store trail
            comet.trail.push({ theta: comet.theta, phi: comet.phi, time: now });
            if (comet.trail.length > 40) comet.trail.shift();
            let alpha = 0.9;
            const t = age / comet.duration;
            if (t < 0.05) alpha *= t / 0.05;
            if (t > 0.9) alpha *= (1 - t) / 0.1;
            // Draw tail
            for (let i = comet.trail.length - 2; i >= 0; i--) {
                const tp = projectStar(comet.trail[i], comet.layerSpeed, viewRotX, viewRotY);
                if (!tp || isOccludedByHole(tp.x, tp.y)) continue;
                const fade = (i / comet.trail.length);
                starsCtx.fillStyle = `rgba(200, 220, 255, ${alpha * fade * 0.3})`;
                starsCtx.beginPath();
                starsCtx.arc(tp.x, tp.y, (0.8 + fade * 0.5) * dpr, 0, Math.PI * 2);
                starsCtx.fill();
            }
            // Bright head
            starsCtx.fillStyle = `rgba(255, 255, 240, ${alpha})`;
            starsCtx.beginPath();
            starsCtx.arc(p.x, p.y, 1.8 * dpr, 0, Math.PI * 2);
            starsCtx.fill();
            // Coma glow
            starsCtx.fillStyle = `rgba(200, 230, 255, ${alpha * 0.25})`;
            starsCtx.beginPath();
            starsCtx.arc(p.x, p.y, 4 * dpr, 0, Math.PI * 2);
            starsCtx.fill();
        }

        // ── Pulsar Beam — star with sweeping cone of light ──
        function drawPulsarBeam(now, w, h, isDark, viewRotX, viewRotY) {
            if (!isDark || !pulsarStar) return;
            const star = starLayers[pulsarStar.layerIdx].stars[pulsarStar.starIdx];
            if (!star || star.dead) return;
            const p = projectStar(star, starLayers[pulsarStar.layerIdx].speed, viewRotX, viewRotY);
            if (!p || isOccludedByHole(p.x, p.y)) { pulsarScreenPos = null; return; }
            const dpr = window.devicePixelRatio;
            pulsarScreenPos = { x: p.x, y: p.y };
            const beamAngle = now * 0.006; // fast spin
            const beamLen = 30 * dpr;
            const coneWidth = 0.25;
            // Two opposite beams
            for (let side = 0; side < 2; side++) {
                const a = beamAngle + side * Math.PI;
                const bx = Math.cos(a) * beamLen, by = Math.sin(a) * beamLen;
                // Cone shape via triangle
                const lx = Math.cos(a + coneWidth) * beamLen, ly = Math.sin(a + coneWidth) * beamLen;
                const rx = Math.cos(a - coneWidth) * beamLen, ry = Math.sin(a - coneWidth) * beamLen;
                const grad = starsCtx.createRadialGradient(p.x, p.y, 0, p.x, p.y, beamLen);
                grad.addColorStop(0, `rgba(200, 220, 255, 0.25)`);
                grad.addColorStop(0.5, `rgba(180, 200, 255, 0.08)`);
                grad.addColorStop(1, `rgba(180, 200, 255, 0)`);
                starsCtx.fillStyle = grad;
                starsCtx.beginPath();
                starsCtx.moveTo(p.x, p.y);
                starsCtx.lineTo(p.x + lx, p.y + ly);
                starsCtx.lineTo(p.x + rx, p.y + ry);
                starsCtx.closePath();
                starsCtx.fill();
            }
            // Core pulse
            const pulse = 0.6 + 0.4 * Math.abs(Math.sin(beamAngle));
            starsCtx.fillStyle = `rgba(200, 220, 255, ${pulse})`;
            starsCtx.beginPath();
            starsCtx.arc(p.x, p.y, 1.5 * dpr, 0, Math.PI * 2);
            starsCtx.fill();
        }

        // ── Nebula Birth — expanding colored cloud from supernova ──
        function drawNebulaBirths(now, w, h, isDark, viewRotX, viewRotY) {
            if (!isDark) return;
            const dpr = window.devicePixelRatio;
            for (let i = nebulaBirths.length - 1; i >= 0; i--) {
                const nb = nebulaBirths[i];
                const age = now - nb.born;
                if (age > nb.duration) { nebulaBirths.splice(i, 1); continue; }
                const p = projectStar(nb, nb.layerSpeed, viewRotX, viewRotY);
                if (!p || isOccludedByHole(p.x, p.y)) continue;
                const t = age / nb.duration;
                const radius = (5 + t * 30) * dpr;
                const alpha = (1 - t) * 0.12;
                const grad = starsCtx.createRadialGradient(p.x, p.y, 0, p.x, p.y, radius);
                grad.addColorStop(0, `rgba(${nb.r}, ${nb.g}, ${nb.b}, ${alpha})`);
                grad.addColorStop(0.4, `rgba(${nb.r}, ${nb.g}, ${nb.b}, ${alpha * 0.5})`);
                grad.addColorStop(1, `rgba(${nb.r}, ${nb.g}, ${nb.b}, 0)`);
                starsCtx.fillStyle = grad;
                starsCtx.beginPath();
                starsCtx.arc(p.x, p.y, radius, 0, Math.PI * 2);
                starsCtx.fill();
                // Wispy tendrils
                for (let j = 0; j < 4; j++) {
                    const ta = j * Math.PI / 2 + t * 0.5;
                    const tx = p.x + Math.cos(ta) * radius * 0.8;
                    const ty = p.y + Math.sin(ta) * radius * 0.8;
                    starsCtx.fillStyle = `rgba(${nb.r}, ${nb.g}, ${nb.b}, ${alpha * 0.4})`;
                    starsCtx.beginPath();
                    starsCtx.arc(tx, ty, radius * 0.3, 0, Math.PI * 2);
                    starsCtx.fill();
                }
            }
        }

        // ── Tidal Disruption — star spiraling into black hole ──
        function updateTidalDisruption(now, w, h, isDark, viewRotX, viewRotY) {
            if (!isDark) return;
            if (!tidalDisrupt && now > tidalNextTime) {
                // Pick a star that's somewhat near the center
                const cx = w / 2, cy = h / 2;
                for (let attempt = 0; attempt < 30; attempt++) {
                    const li = 0; // near layer
                    const layer = starLayers[li];
                    const si = Math.floor(Math.random() * layer.stars.length);
                    const star = layer.stars[si];
                    if (star.dead || star.paleBlueDot) continue;
                    const p = projectStar(star, layer.speed, viewRotX, viewRotY);
                    if (!p) continue;
                    const dist = Math.sqrt((p.x - cx) ** 2 + (p.y - cy) ** 2);
                    const hR = getHorizonRadius();
                    if (dist > hR * 3 && dist < hR * 8) {
                        tidalDisrupt = { theta: star.theta, phi: star.phi, origTheta: star.theta, origPhi: star.phi,
                            layerSpeed: layer.speed, born: now, duration: 15000 + Math.random() * 10000, starIdx: si };
                        break;
                    }
                }
            }
            if (!tidalDisrupt) { tidalScreenPos = null; return; }
            const age = now - tidalDisrupt.born;
            if (age > tidalDisrupt.duration) {
                starLayers[0].stars[tidalDisrupt.starIdx].dead = true;
                tidalDisrupt = null; tidalScreenPos = null; tidalNextTime = now + 60000 + Math.random() * 60000; return;
            }
            const dpr = window.devicePixelRatio;
            const t = age / tidalDisrupt.duration;
            // Spiral inward — angle increases, radius decreases
            const spiralAngle = t * Math.PI * 6;
            const spiralR = (1 - t * t) * 0.15; // quadratic collapse
            const cx2 = w / 2, cy2 = h / 2;
            // Calculate center direction in theta/phi space
            const centerTheta = tidalDisrupt.origTheta;
            const centerPhi = tidalDisrupt.origPhi;
            const theta = centerTheta + Math.cos(spiralAngle) * spiralR;
            const phi = centerPhi + Math.sin(spiralAngle) * spiralR;
            const p = projectStar({ theta, phi }, tidalDisrupt.layerSpeed, viewRotX, viewRotY);
            if (!p) { tidalScreenPos = null; return; }
            tidalScreenPos = { x: p.x, y: p.y };
            // Color shifts toward red as it approaches
            const redness = t;
            const r = 255, g = Math.round(240 * (1 - redness * 0.7)), b = Math.round(200 * (1 - redness * 0.9));
            let alpha = 0.8 * (1 - t * 0.5);
            // Stretching
            const stretch = 1 + t * 2;
            starsCtx.save();
            starsCtx.translate(p.x, p.y);
            starsCtx.rotate(spiralAngle);
            starsCtx.scale(1, stretch);
            starsCtx.fillStyle = `rgba(${r}, ${g}, ${b}, ${alpha})`;
            starsCtx.beginPath();
            starsCtx.arc(0, 0, (1.5 - t * 0.5) * dpr, 0, Math.PI * 2);
            starsCtx.fill();
            starsCtx.restore();
            // Debris trail
            for (let i = 1; i <= 5; i++) {
                const tt = Math.max(0, t - i * 0.03);
                const sa = tt * Math.PI * 6;
                const sr = (1 - tt * tt) * 0.15;
                const tTheta = centerTheta + Math.cos(sa) * sr;
                const tPhi = centerPhi + Math.sin(sa) * sr;
                const tp = projectStar({ theta: tTheta, phi: tPhi }, tidalDisrupt.layerSpeed, viewRotX, viewRotY);
                if (tp) {
                    starsCtx.fillStyle = `rgba(255, ${150 + i * 20}, ${50 + i * 20}, ${alpha * (1 - i / 5) * 0.4})`;
                    starsCtx.beginPath();
                    starsCtx.arc(tp.x, tp.y, 0.6 * dpr, 0, Math.PI * 2);
                    starsCtx.fill();
                }
            }
        }

        // ── Binary Star Merger — two stars spiral together and merge ──
        function updateStarMerger(now, w, h, isDark, viewRotX, viewRotY) {
            if (!isDark) return;
            if (!starMerger && now > mergerNextTime) {
                const s = pickRandomVisibleStar(viewRotX, viewRotY);
                if (s) {
                    starMerger = { theta: s.star.theta, phi: s.star.phi, layerSpeed: starLayers[s.layerIdx].speed,
                        born: now, duration: 18000 + Math.random() * 7000, merged: false, mergeTime: 0 };
                }
            }
            if (!starMerger) return;
            const age = now - starMerger.born;
            if (age > starMerger.duration) { starMerger = null; mergerNextTime = now + 70000 + Math.random() * 50000; return; }
            const dpr = window.devicePixelRatio;
            const p = projectStar(starMerger, starMerger.layerSpeed, viewRotX, viewRotY);
            if (!p || isOccludedByHole(p.x, p.y)) return;
            const t = age / starMerger.duration;
            const mergePoint = 0.7;
            if (t < mergePoint) {
                // Two stars spiraling closer
                const sep = (1 - t / mergePoint) * 8 * dpr;
                const angle = now * 0.004;
                const ax = p.x + Math.cos(angle) * sep, ay = p.y + Math.sin(angle) * sep;
                const bx = p.x - Math.cos(angle) * sep, by = p.y - Math.sin(angle) * sep;
                const alpha = 0.7;
                starsCtx.fillStyle = `rgba(255, 240, 220, ${alpha})`;
                starsCtx.beginPath(); starsCtx.arc(ax, ay, 1.3 * dpr, 0, Math.PI * 2); starsCtx.fill();
                starsCtx.fillStyle = `rgba(200, 220, 255, ${alpha})`;
                starsCtx.beginPath(); starsCtx.arc(bx, by, 1.1 * dpr, 0, Math.PI * 2); starsCtx.fill();
                // Mass transfer stream
                starsCtx.strokeStyle = `rgba(255, 230, 200, 0.15)`;
                starsCtx.lineWidth = 0.5 * dpr;
                starsCtx.beginPath(); starsCtx.moveTo(ax, ay); starsCtx.lineTo(bx, by); starsCtx.stroke();
            } else {
                // Post-merge flash and bright remnant
                const postT = (t - mergePoint) / (1 - mergePoint);
                const flash = postT < 0.2 ? (1 - postT / 0.2) : 0;
                const remnantSize = 2 + flash * 6;
                starsCtx.fillStyle = `rgba(255, 255, 240, ${0.5 + flash * 0.5})`;
                starsCtx.beginPath();
                starsCtx.arc(p.x, p.y, remnantSize * dpr, 0, Math.PI * 2);
                starsCtx.fill();
                if (flash > 0.1) {
                    starsCtx.fillStyle = `rgba(255, 255, 255, ${flash * 0.3})`;
                    starsCtx.beginPath();
                    starsCtx.arc(p.x, p.y, (remnantSize + 5) * dpr, 0, Math.PI * 2);
                    starsCtx.fill();
                }
            }
        }

        // ── Light Echo — expanding rings after supernova ──
        function drawLightEchoes(now, w, h, isDark, viewRotX, viewRotY) {
            if (!isDark) return;
            const dpr = window.devicePixelRatio;
            for (let i = lightEchoes.length - 1; i >= 0; i--) {
                const le = lightEchoes[i];
                const age = now - le.born;
                if (age > le.duration) { lightEchoes.splice(i, 1); continue; }
                const p = projectStar(le, le.layerSpeed, viewRotX, viewRotY);
                if (!p || isOccludedByHole(p.x, p.y)) continue;
                const t = age / le.duration;
                // Multiple expanding rings
                for (let r = 0; r < 3; r++) {
                    const ringT = Math.max(0, t - r * 0.15);
                    if (ringT <= 0) continue;
                    const radius = ringT * 35 * dpr;
                    const alpha = (1 - ringT) * 0.15 * (1 - r * 0.3);
                    starsCtx.strokeStyle = `rgba(220, 230, 255, ${alpha})`;
                    starsCtx.lineWidth = (1.5 - r * 0.3) * dpr;
                    starsCtx.beginPath();
                    starsCtx.arc(p.x, p.y, radius, 0, Math.PI * 2);
                    starsCtx.stroke();
                }
            }
        }

        // ── Quasar Ignition — distant star flares incredibly bright ──
        function updateQuasar(now, w, h, isDark, viewRotX, viewRotY) {
            if (!isDark) return;
            if (!quasar && now > quasarNextTime) {
                const s = pickRandomVisibleStar(viewRotX, viewRotY);
                if (s) {
                    quasar = { theta: s.star.theta, phi: s.star.phi, layerSpeed: starLayers[s.layerIdx].speed,
                        born: now, duration: 8000 + Math.random() * 5000 };
                }
            }
            if (!quasar) { quasarScreenPos = null; return; }
            const age = now - quasar.born;
            if (age > quasar.duration) { quasar = null; quasarScreenPos = null; quasarNextTime = now + 80000 + Math.random() * 80000; return; }
            const dpr = window.devicePixelRatio;
            const p = projectStar(quasar, quasar.layerSpeed, viewRotX, viewRotY);
            if (!p || isOccludedByHole(p.x, p.y)) { quasarScreenPos = null; return; }
            quasarScreenPos = { x: p.x, y: p.y };
            const t = age / quasar.duration;
            // Bright flare then steady glow
            let brightness;
            if (t < 0.1) brightness = t / 0.1;
            else if (t < 0.3) brightness = 1;
            else brightness = Math.pow(1 - (t - 0.3) / 0.7, 1.5);
            // Incredibly bright core
            starsCtx.fillStyle = `rgba(255, 255, 255, ${brightness * 0.95})`;
            starsCtx.beginPath();
            starsCtx.arc(p.x, p.y, (2 + brightness * 3) * dpr, 0, Math.PI * 2);
            starsCtx.fill();
            // Wide glow
            starsCtx.fillStyle = `rgba(200, 220, 255, ${brightness * 0.2})`;
            starsCtx.beginPath();
            starsCtx.arc(p.x, p.y, (8 + brightness * 10) * dpr, 0, Math.PI * 2);
            starsCtx.fill();
            // Jets
            const jetLen = (15 + brightness * 15) * dpr;
            const jetAngle = 0.3; // fixed orientation
            for (let s = 0; s < 2; s++) {
                const a = jetAngle + s * Math.PI;
                const grad = starsCtx.createLinearGradient(p.x, p.y, p.x + Math.cos(a) * jetLen, p.y + Math.sin(a) * jetLen);
                grad.addColorStop(0, `rgba(180, 200, 255, ${brightness * 0.5})`);
                grad.addColorStop(1, `rgba(180, 200, 255, 0)`);
                starsCtx.strokeStyle = grad;
                starsCtx.lineWidth = (1 + brightness) * dpr;
                starsCtx.beginPath();
                starsCtx.moveTo(p.x, p.y);
                starsCtx.lineTo(p.x + Math.cos(a) * jetLen, p.y + Math.sin(a) * jetLen);
                starsCtx.stroke();
            }
        }

        // ── Solar System — planets orbiting Sol ──
        function drawSolarSystem(now, w, h, isDark, viewRotX, viewRotY) {
            if (!isDark || !paleBlueDotStar) return;
            const sol = starLayers[paleBlueDotStar.layerIdx].stars[paleBlueDotStar.starIdx];
            if (!sol) return;
            const p = projectStar(sol, starLayers[paleBlueDotStar.layerIdx].speed, viewRotX, viewRotY);
            if (!p || isOccludedByHole(p.x, p.y)) { planetScreenPositions = {}; return; }
            const dpr = window.devicePixelRatio;
            const fov = Math.min(w, h) * 0.55;
            planetScreenPositions = {};
            for (const planet of solarSystem) {
                const orbitAngle = now * planet.speed;
                const orbitR = planet.orbitR * fov;
                const px = p.x + Math.cos(orbitAngle) * orbitR;
                const py = p.y + Math.sin(orbitAngle) * orbitR * 0.35; // tilt
                if (isOccludedByHole(px, py)) continue;
                planetScreenPositions[planet.name] = { x: px, y: py };
                // Planet dot
                starsCtx.fillStyle = `rgba(${planet.r}, ${planet.g}, ${planet.b}, 0.8)`;
                starsCtx.beginPath();
                starsCtx.arc(px, py, planet.size * dpr, 0, Math.PI * 2);
                starsCtx.fill();
                // Saturn's ring
                if (planet.ring) {
                    starsCtx.strokeStyle = `rgba(${planet.r}, ${planet.g}, ${planet.b}, 0.4)`;
                    starsCtx.lineWidth = 0.4 * dpr;
                    starsCtx.beginPath();
                    starsCtx.ellipse(px, py, planet.size * 2 * dpr, planet.size * 0.6 * dpr, 0.3, 0, Math.PI * 2);
                    starsCtx.stroke();
                }
                // Faint orbit path
                starsCtx.strokeStyle = `rgba(100, 130, 200, 0.04)`;
                starsCtx.lineWidth = 0.3 * dpr;
                starsCtx.beginPath();
                starsCtx.ellipse(p.x, p.y, orbitR, orbitR * 0.35, 0, 0, Math.PI * 2);
                starsCtx.stroke();
            }
        }

        generateStars();

        drawStars(darkMQ.matches, 0, 0, 0);
        window.addEventListener('resize', () => { generateStars(); drawStars(document.body.classList.contains('dark-mode'), userDragX, userDragY, performance.now()); });

        // ── Sci-fi reticle cursor with spaghettification ──
        const cursorCanvas = document.createElement('canvas');
        const CW = 48, CH = 48;
        cursorCanvas.width = CW; cursorCanvas.height = CH;
        cursorCanvas.style.cssText = 'position:fixed;pointer-events:none;z-index:9999;display:none;';
        document.body.appendChild(cursorCanvas);
        const cursorCtx = cursorCanvas.getContext('2d');
        let cursorOverText = false;

        function drawReticle(alpha, scaleX, scaleY, rotation, lockProgress) {
            cursorCtx.clearRect(0, 0, CW, CH);
            const isDk = document.body.classList.contains('dark-mode');
            const col = isDk ? '255,255,255' : '0,0,0';
            const now = performance.now();
            const lp = lockProgress || 0; // 0 = normal, 1 = fully locked

            cursorCtx.save();
            cursorCtx.translate(CW / 2, CH / 2);
            if (rotation !== 0) cursorCtx.rotate(rotation);
            cursorCtx.scale(scaleX, scaleY);
            cursorCtx.globalAlpha = alpha;

            // Center dot — shrinks when locking
            const dotR = 1.5 - lp * 0.5;
            cursorCtx.fillStyle = lp > 0.5 ? `rgba(100,200,255,0.9)` : `rgba(${col},0.9)`;
            cursorCtx.beginPath();
            cursorCtx.arc(0, 0, dotR, 0, Math.PI * 2);
            cursorCtx.fill();

            // Crosshair lines — contract when locking
            const lineCol = lp > 0.5 ? '100,200,255' : col;
            cursorCtx.strokeStyle = `rgba(${lineCol},${0.5 + lp * 0.3})`;
            cursorCtx.lineWidth = 0.8;
            const gap = 4 - lp * 1.5;
            const len = 10 - lp * 3;
            for (let i = 0; i < 4; i++) {
                const a = i * Math.PI / 2;
                const cos = Math.cos(a), sin = Math.sin(a);
                cursorCtx.beginPath();
                cursorCtx.moveTo(cos * gap, sin * gap);
                cursorCtx.lineTo(cos * len, sin * len);
                cursorCtx.stroke();
            }

            // Rotating outer arc segments — gentle extra rotation when locking (90° over full lock)
            const spin = now * 0.001 + lp * Math.PI / 2;
            const arcCol = lp > 0.5 ? '100,200,255' : col;
            cursorCtx.strokeStyle = `rgba(${arcCol},${0.35 + lp * 0.35})`;
            cursorCtx.lineWidth = 0.7 + lp * 0.3;
            const arcR = 13 - lp * 4;
            for (let i = 0; i < 3; i++) {
                const arcStart = spin + i * Math.PI * 2 / 3;
                cursorCtx.beginPath();
                cursorCtx.arc(0, 0, arcR, arcStart, arcStart + 0.5 + lp * 0.3);
                cursorCtx.stroke();
            }

            // Inner ring — contracts and brightens
            const ringCol = lp > 0.5 ? '100,200,255' : col;
            cursorCtx.strokeStyle = `rgba(${ringCol},${0.15 + lp * 0.4})`;
            cursorCtx.lineWidth = 0.5 + lp * 0.5;
            cursorCtx.beginPath();
            cursorCtx.arc(0, 0, 7 - lp * 3, 0, Math.PI * 2);
            cursorCtx.stroke();

            cursorCtx.restore();
        }

        function isTextElement(el) {
            if (!el) return false;
            const tag = el.tagName;
            if (tag === 'A' || tag === 'BUTTON' || tag === 'INPUT' || tag === 'TEXTAREA') return true;
            if (el.classList.contains('ui-info-link') || el.classList.contains('theme-toggle')) return true;
            if (el.closest('.info-text') || el.closest('.ui-name')) return true;
            if (el.closest('.ui-date') || el.closest('.ui-time')) return true;

        }

        let cursorX = -100, cursorY = -100, cursorVisible = false;

        document.addEventListener('pointermove', e => {
            cursorX = e.clientX;

        // Find nearest visible star to cursor (in CSS pixels)
        function findNearestStar() {
            const dpr = window.devicePixelRatio;
            const px = cursorX * dpr, py = cursorY * dpr;
            const w = starsCanvas.width, h = starsCanvas.height;
            const cx = w / 2, cy = h / 2;
            const fov = Math.min(w, h) * 0.55;
            const canvasR = canvas.getBoundingClientRect();
            const hR = (canvasR.width * dpr) * 0.62 * 0.55 / (frustum * 2);

            let bestDist = Infinity, bestSX = 0, bestSY = 0, bestLayer = -1, bestIdx = -1;

            for (let li = 0; li < starLayers.length; li++) {
                const layer = starLayers[li];
                const rX = userDragX * layer.speed, rY = userDragY * layer.speed;
                const cosY = Math.cos(rY), sinY = Math.sin(rY);
                const cosX = Math.cos(rX), sinX = Math.sin(rX);

                for (let si = 0; si < layer.stars.length; si++) {
                    const star = layer.stars[si];
                    if (star.dead) continue;
                    const sp = Math.sin(star.phi);
                    const x = sp * Math.cos(star.theta);
                    const y = Math.cos(star.phi);
                    const z = sp * Math.sin(star.theta);
                    const x1 = x * cosY - z * sinY;
                    const z1 = x * sinY + z * cosY;
                    const y2 = y * cosX - z1 * sinX;
                    const z2 = y * sinX + z1 * cosX;
                    if (z2 < 0.4) continue;
                    const sx = cx + (x1 / z2) * fov;
                    const sy = cy - (y2 / z2) * fov;
                    const distC = Math.sqrt((sx - cx) ** 2 + (sy - cy) ** 2);
                    if (distC < hR) continue;
                    const d = Math.sqrt((sx - px) ** 2 + (sy - py) ** 2);
                    if (d < bestDist) {
                        bestDist = d;
                        bestSX = sx; bestSY = sy;
                        bestLayer = li; bestIdx = si;
                    }
                }
            }
            // Also check exodus fleet and von neumann probe
            if (exodusScreenPos) {
                const d = Math.sqrt((exodusScreenPos.x - px) ** 2 + (exodusScreenPos.y - py) ** 2);
                if (d < bestDist) {
                    bestDist = d; bestSX = exodusScreenPos.x; bestSY = exodusScreenPos.y;
                    bestLayer = -1; bestIdx = -1;
                }
            }
            for (const vnPos of vonNeumannScreenPositions) {
                const d = Math.sqrt((vnPos.x - px) ** 2 + (vnPos.y - py) ** 2);
                if (d < bestDist) {
                    bestDist = d; bestSX = vnPos.x; bestSY = vnPos.y;
                    bestLayer = -2; bestIdx = -1;
                }
            }
            // Check new sci-fi objects
            const sciFiChecks = [
                { pos: dysonScreenPos, layer: -3 },
                { pos: ringworldScreenPos, layer: -4 },
                { pos: stellarEngineScreenPos, layer: -5 },
                { pos: shkadovScreenPos, layer: -7 },
                { pos: bracewellScreenPos, layer: -8 },
                { pos: setiScreenPos, layer: -9 },
                { pos: spaceElevatorScreenPos, layer: -10 },
                { pos: genShipScreenPos, layer: -11 },
                { pos: asteroidMiningScreenPos, layer: -12 },
                { pos: rocketScreenPos, layer: -13 },
                { pos: derelictScreenPos, layer: -14 },
                { pos: cryoPodScreenPos, layer: -15 },
                { pos: terraformScreenPos, layer: -16 },
                { pos: lighthouseScreenPos, layer: -17 },
                { pos: dysonBuildScreenPos, layer: -18 },
                { pos: warRemnantScreenPos, layer: -19 },
                { pos: highwayScreenPos, layer: -20 },

                { pos: phantomScreenPos, layer: -22 },
                { pos: cometScreenPos, layer: -23 },
                { pos: quasarScreenPos, layer: -24 },
                { pos: tidalScreenPos, layer: -25 },
                { pos: pulsarScreenPos, layer: -26 },
            ];
            // Also check planets
            for (const [pName, pPos] of Object.entries(planetScreenPositions)) {
                const d = Math.sqrt((pPos.x - px) ** 2 + (pPos.y - py) ** 2);
                if (d < bestDist) {
                    bestDist = d; bestSX = pPos.x; bestSY = pPos.y;
                    bestLayer = -100; bestIdx = solarSystem.findIndex(p => p.name === pName);
                }
            }
            for (const check of sciFiChecks) {
                if (check.pos) {
                    const d = Math.sqrt((check.pos.x - px) ** 2 + (check.pos.y - py) ** 2);
                    if (d < bestDist) {
                        bestDist = d; bestSX = check.pos.x; bestSY = check.pos.y;
                        bestLayer = check.layer; bestIdx = -1;
                    }
                }
            }

            const threshold = LOCK_RADIUS * dpr;
            if (bestDist < threshold) {
                return { layerIdx: bestLayer, starIdx: bestIdx, screenX: bestSX, screenY: bestSY, dist: bestDist };
            }
            return null;
        }

        // Draw lock-on label on stars canvas (called from animate)
        function drawLockOnLabel(now, w, h, isDark) {
            if (!isDark || !lockActive || !lockTarget) return;

            const dpr = window.devicePixelRatio;
            let sx, sy;

            if (lockTarget.layerIdx === -1) {
                // Exodus fleet — use stored screen position
                if (!exodusScreenPos) { lockActive = false; lockTarget = null; return; }
                sx = exodusScreenPos.x; sy = exodusScreenPos.y;
            } else if (lockTarget.layerIdx === -2) {
                // Von Neumann probe — use stored screen position
                if (vonNeumannScreenPositions.length === 0) { lockActive = false; lockTarget = null; return; }
                // Find closest probe to last known position
                let closestVN = vonNeumannScreenPositions[0];
                let closestD = Infinity;
                for (const vp of vonNeumannScreenPositions) {
                    const d = Math.sqrt((vp.x - lockTarget.screenX) ** 2 + (vp.y - lockTarget.screenY) ** 2);
                    if (d < closestD) { closestD = d; closestVN = vp; }
                }
                sx = closestVN.x; sy = closestVN.y;
            } else if (lockTarget.layerIdx === -100) {
                // Planet
                const planet = solarSystem[lockTarget.starIdx];
                if (!planet) { lockActive = false; lockTarget = null; return; }
                const pPos = planetScreenPositions[planet.name];
                if (!pPos) { lockActive = false; lockTarget = null; return; }
                sx = pPos.x; sy = pPos.y;
            } else if (lockTarget.layerIdx <= -3) {
                // Sci-fi megastructure objects
                const posMap = {
                    '-3': dysonScreenPos, '-4': ringworldScreenPos, '-5': stellarEngineScreenPos,
                    '-7': shkadovScreenPos, '-8': bracewellScreenPos, '-9': setiScreenPos,
                    '-10': spaceElevatorScreenPos, '-11': genShipScreenPos, '-12': asteroidMiningScreenPos,
                    '-13': rocketScreenPos, '-14': derelictScreenPos,
                    '-15': cryoPodScreenPos, '-16': terraformScreenPos, '-17': lighthouseScreenPos,
                    '-18': dysonBuildScreenPos, '-19': warRemnantScreenPos,
                    '-20': highwayScreenPos, '-22': phantomScreenPos,
                    '-23': cometScreenPos, '-24': quasarScreenPos, '-25': tidalScreenPos,
                    '-26': pulsarScreenPos,
                };
                const pos = posMap[String(lockTarget.layerIdx)];
                if (!pos) { lockActive = false; lockTarget = null; return; }
                sx = pos.x; sy = pos.y;
            } else {
                const layer = starLayers[lockTarget.layerIdx];
                const star = layer.stars[lockTarget.starIdx];
                if (!star || star.dead) { lockActive = false; lockTarget = null; return; }

                // Re-project star position
                const cx = w / 2, cy = h / 2;
                const fov = Math.min(w, h) * 0.55;
                const rX = userDragX * layer.speed, rY = userDragY * layer.speed;
                const cosY = Math.cos(rY), sinY = Math.sin(rY);
                const cosX = Math.cos(rX), sinX = Math.sin(rX);
                const sp = Math.sin(star.phi);
                const x = sp * Math.cos(star.theta), y = Math.cos(star.phi), z = sp * Math.sin(star.theta);
                const x1 = x * cosY - z * sinY;
                const z1 = x * sinY + z * cosY;
                const y2 = y * cosX - z1 * sinX;
                const z2 = y * sinX + z1 * cosX;
                if (z2 < 0.4) return;
                sx = (w / 2) + (x1 / z2) * (Math.min(w, h) * 0.55);
                sy = (h / 2) - (y2 / z2) * (Math.min(w, h) * 0.55);
            }

            // Update lock target screen position
            lockTarget.screenX = sx;
            lockTarget.screenY = sy;

            // Animate fade in
            lockFadeIn = Math.min(1, lockFadeIn + 0.04);
            const alpha = lockFadeIn * 0.85;

            // Corner brackets — color by type
            const bracketSize = (8 + 2 * Math.sin(now * 0.003)) * dpr;
            const bracketLen = 4 * dpr;
            const sciFiColors = {
                '-1': [255, 200, 120], '-2': [160, 255, 180], '-3': [255, 200, 100],
                '-4': [180, 220, 255], '-5': [255, 180, 100], '-7': [255, 240, 180],
                '-8': [200, 220, 255], '-9': [100, 255, 140],
                '-10': [180, 200, 220], '-11': [200, 190, 180], '-12': [200, 180, 120],
                '-13': [255, 200, 80], '-14': [150, 150, 160],
                '-15': [160, 200, 255], '-16': [100, 200, 140], '-17': [255, 255, 220],
                '-18': [255, 240, 200], '-19': [180, 100, 80],
                '-20': [200, 200, 220], '-22': [180, 200, 255],
                '-23': [200, 230, 255], '-24': [255, 255, 255], '-25': [255, 180, 120],
                '-26': [200, 220, 255], '-100': [100, 180, 255],
            };
            // Also map regular star indices to special colors
            const starColorMap = [
                { ref: dysonSwarmStar, color: [255, 200, 100] },
                { ref: ringworldStar, color: [180, 220, 255] },
                { ref: shkadovStar, color: [255, 240, 180] },
                { ref: setiStar, color: [100, 255, 140] },
                { ref: spaceElevatorStar, color: [180, 200, 220] },
                { ref: asteroidMiningStar, color: [200, 180, 120] },
                { ref: terraformStar, color: [100, 200, 140] },
                { ref: lighthouseStar, color: [255, 255, 220] },
                { ref: dysonBuildStar, color: [255, 240, 200] },
                { ref: warRemnantStar, color: [180, 100, 80] },
            ];
            let lc = sciFiColors[String(lockTarget.layerIdx)];
            if (lockTarget.layerIdx === -100 && lockTarget.starIdx >= 0 && lockTarget.starIdx < solarSystem.length) {
                const pl = solarSystem[lockTarget.starIdx];
                lc = [pl.r, pl.g, pl.b];
            }
            if (!lc && lockTarget.layerIdx >= 0) {
                const cm = starColorMap.find(s => s.ref && s.ref.layerIdx === lockTarget.layerIdx && s.ref.starIdx === lockTarget.starIdx);
                lc = cm ? cm.color : [100, 200, 255];
            }
            if (!lc) lc = [100, 200, 255];
            const lockColor = `rgba(${lc[0]}, ${lc[1]}, ${lc[2]}, ${alpha})`;
            starsCtx.strokeStyle = lockColor;
            starsCtx.lineWidth = 1 * dpr;

            // Top-left
            starsCtx.beginPath();
            starsCtx.moveTo(sx - bracketSize, sy - bracketSize + bracketLen);
            starsCtx.lineTo(sx - bracketSize, sy - bracketSize);
            starsCtx.lineTo(sx - bracketSize + bracketLen, sy - bracketSize);
            starsCtx.stroke();
            // Top-right
            starsCtx.beginPath();
            starsCtx.moveTo(sx + bracketSize - bracketLen, sy - bracketSize);
            starsCtx.lineTo(sx + bracketSize, sy - bracketSize);
            starsCtx.lineTo(sx + bracketSize, sy - bracketSize + bracketLen);
            starsCtx.stroke();
            // Bottom-left
            starsCtx.beginPath();
            starsCtx.moveTo(sx - bracketSize, sy + bracketSize - bracketLen);
            starsCtx.lineTo(sx - bracketSize, sy + bracketSize);
            starsCtx.lineTo(sx - bracketSize + bracketLen, sy + bracketSize);
            starsCtx.stroke();
            // Bottom-right
            starsCtx.beginPath();
            starsCtx.moveTo(sx + bracketSize - bracketLen, sy + bracketSize);
            starsCtx.lineTo(sx + bracketSize, sy + bracketSize);
            starsCtx.lineTo(sx + bracketSize, sy + bracketSize - bracketLen);
            starsCtx.stroke();

            // Generate label based on object type
            let label;
            const loreMap = { '-3': 'dyson', '-4': 'ringworld', '-5': 'stellarEngine', '-7': 'shkadov', '-8': 'bracewell', '-9': 'seti', '-10': 'elevator', '-11': 'genShip', '-12': 'mining', '-13': 'rocket', '-14': 'derelict', '-15': 'cryoPod', '-16': 'terraform', '-17': 'lighthouse', '-18': 'dysonBuild', '-19': 'warRemnant', '-20': 'highway', '-22': 'phantom', '-23': 'comet', '-24': 'quasar', '-25': 'tidalDisrupt', '-26': 'pulsar' };
            // Planet labels
            if (lockTarget.layerIdx === -100) {
                const planet = solarSystem[lockTarget.starIdx];
                if (planet) label = GALACTICA_LORE[planet.name];
            }
            const loreKey = loreMap[String(lockTarget.layerIdx)];
            if (!label && loreKey && GALACTICA_LORE[loreKey]) {
                label = GALACTICA_LORE[loreKey];
            } else if (lockTarget.layerIdx === -1) {
                label = 'Exodus Fleet  ·  Human  ·  In Transit';
            } else if (lockTarget.layerIdx === -2) {
                label = 'Von Neumann Probe  ·  Artificial  ·  Self-Replicating';
            } else {
                const isPBD = paleBlueDotStar && lockTarget.layerIdx === paleBlueDotStar.layerIdx && lockTarget.starIdx === paleBlueDotStar.starIdx;
                // Check if this regular star is actually a special sci-fi object
                const specialStars = [
                    { ref: dysonSwarmStar, key: 'dyson' },
                    { ref: ringworldStar, key: 'ringworld' },
                    { ref: shkadovStar, key: 'shkadov' },
                    { ref: setiStar, key: 'seti' },
                    { ref: spaceElevatorStar, key: 'elevator' },
                    { ref: asteroidMiningStar, key: 'mining' },
                    { ref: terraformStar, key: 'terraform' },
                    { ref: lighthouseStar, key: 'lighthouse' },
                    { ref: dysonBuildStar, key: 'dysonBuild' },
                    { ref: warRemnantStar, key: 'warRemnant' },
                ];
                const specialMatch = specialStars.find(s => s.ref && s.ref.layerIdx === lockTarget.layerIdx && s.ref.starIdx === lockTarget.starIdx);
                if (isPBD) {
                    label = 'Sol  ·  G2V  ·  Home';
                } else if (specialMatch) {
                    label = GALACTICA_LORE[specialMatch.key];
                } else {
                    const seed = lockTarget.layerIdx * 10000 + lockTarget.starIdx;
                    const name = STAR_NAMES[seed % STAR_NAMES.length];
                    const cls = STAR_CLASSES[seed % STAR_CLASSES.length];
                    const catalog = `JMK-${String(seed).padStart(4, '0')}`;
                    label = `${name}  ·  ${cls}  ·  ${catalog}`;
                }
            }

            const fontSize = Math.round(9 * dpr);
            starsCtx.font = `${fontSize}px 'SF Mono', monospace`;
            starsCtx.textAlign = 'left';
            starsCtx.textBaseline = 'top';
            const textColor = `rgba(${lc[0]}, ${lc[1]}, ${lc[2]}, ${alpha * 0.8})`;
            starsCtx.fillStyle = textColor;
            starsCtx.fillText(label, sx + bracketSize + 4 * dpr, sy - bracketSize);
        }

        const isTouchDevice = !window.matchMedia('(hover: hover)').matches;
        function updateCursorReticle() {
            requestAnimationFrame(updateCursorReticle);
            if (isTouchDevice) {
                cursorCanvas.style.display = 'none';
                return;
            }

            const rect = canvas.getBoundingClientRect();
            const cx = rect.left + rect.width / 2;
            const cy = rect.top + rect.height / 2;
            const dx = cursorX - cx, dy = cursorY - cy;
            const dist = Math.sqrt(dx * dx + dy * dy);
            const holeRadius = rect.width * 0.115;
            const spaghettiZone = rect.width * 0.28;

            const isDark = document.body.classList.contains('dark-mode');
            const now = performance.now();

            // Lock-on detection (only in dark mode, outside spaghetti zone)
            if (isDark && dist >= spaghettiZone) {
                const nearest = findNearestStar();
                if (nearest) {
                    const starKey = nearest.layerIdx + ',' + nearest.starIdx;
                    if (lockHoverStar === starKey) {
                        // Same star — check if time exceeded
                        const elapsed = now - lockHoverStart;
                        if (elapsed >= LOCK_TIME && !lockActive) {
                            lockActive = true;
                            lockTarget = nearest;
                            lockFadeIn = 0;
                        }
                    } else {
                        // New star — reset timer
                        lockHoverStar = starKey;
                        lockHoverStart = now;
                        if (lockActive) { lockActive = false; lockTarget = null; }
                    }
                } else {
                    // No star nearby
                    lockHoverStar = null;
                    if (lockActive) { lockActive = false; lockTarget = null; }
                }
            } else {
                lockHoverStar = null;
                if (lockActive) { lockActive = false; lockTarget = null; }
            }

            // Calculate lock progress for reticle animation
            let lockProgress = 0;
            if (lockActive) {
                lockProgress = 1;
            } else if (lockHoverStar && isDark && dist >= spaghettiZone) {
                lockProgress = Math.min(1, (now - lockHoverStart) / LOCK_TIME);
            }

            if (dist < holeRadius) {
                cursorCanvas.style.display = 'none';
            } else {
                cursorCanvas.style.display = 'block';

                // If locked, snap cursor canvas to star position
                let drawX = cursorX, drawY = cursorY;
                if (lockActive && lockTarget) {
                    const dpr = window.devicePixelRatio;
                    drawX = lockTarget.screenX / dpr;
                    drawY = lockTarget.screenY / dpr;
                }

                if (dist < spaghettiZone) {
                    const t = 1 - (dist - holeRadius) / (spaghettiZone - holeRadius);
                    const stretchY = 1 + t * 1.5;
                    const squishX = 1 - t * 0.35;
                    const alpha = 0.85 - t * 0.5;
                    const angle = Math.atan2(cy - cursorY, cx - cursorX);
                    drawReticle(alpha, squishX, stretchY, angle + Math.PI / 2, 0);
                    drawX = cursorX; drawY = cursorY;
                } else {
                    drawReticle(0.85, 1, 1, 0, lockProgress);
                }
                cursorCanvas.style.left = (drawX - CW / 2) + 'px';
                cursorCanvas.style.top = (drawY - CH / 2) + 'px';
            }
        }
        updateCursorReticle();
    </script>
