<head>

    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' fill='%23fff'/%3E%3Cdefs%3E%3CradialGradient id='dg' cx='50%25' cy='50%25' r='50%25'%3E%3Cstop offset='0%25' stop-color='%23ffcc66'/%3E%3Cstop offset='25%25' stop-color='%23ff7700'/%3E%3Cstop offset='65%25' stop-color='%23cc3300' stop-opacity='0.7'/%3E%3Cstop offset='100%25' stop-color='%23880000' stop-opacity='0'/%3E%3C/radialGradient%3E%3CclipPath id='top'%3E%3Crect x='0' y='0' width='64' height='34'/%3E%3C/clipPath%3E%3CclipPath id='bot'%3E%3Crect x='0' y='34' width='64' height='30'/%3E%3C/clipPath%3E%3C/defs%3E%3Cellipse cx='32' cy='34' rx='28' ry='5' fill='url(%23dg)' clip-path='url(%23top)'/%3E%3Ccircle cx='32' cy='30' r='12' fill='%23000'/%3E%3Cellipse cx='32' cy='34' rx='28' ry='5' fill='url(%23dg)' clip-path='url(%23bot)'/%3E%3C/svg%3E">
    <style>
        @import url('https://fonts.cdnfonts.com/css/sf-mono');
        body {
            font-family: 'SF Mono', monospace;
            font-size: 0.8em;
            line-height: 2;
            margin: 0;
            padding: 0;
            background-color: #fff;
            color: #000;
            transition: background-color 2s, color 2s;
            overflow: hidden;
            height: 100dvh;
        }
        body, body * { cursor: none !important; }
        a {
            color: inherit;
            text-decoration: none;
            cursor: pointer;
        }
        @media (hover: hover) {
            a:hover {
                font-weight: bold;
            }
        }
        footer {
            margin-top: 2vw;
            padding-top: 1vw;
            border-top: 0.1vw solid lightgray;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
            color: #000;
            text-align: center;
            transition: border-top-color 0.3s, color 0.3s;
        }
        .italics {
            font-style: italic;
        }
        .center-align {
            text-align: center;
            flex: 1 1 100%;
        }
        .left-align, .right-align {
            flex: 1 1 100%;
            text-align: center;
        }
        .footer-content {
            margin-bottom: -1em;
        }
        @media (max-width: 375px) {
            .left-align, .right-align {
                text-align: center;
                flex: 1 1 100%;
            }
        }
        body.dark-mode {
            /* background-color: rgb(2, 2, 42); */
            background-color: rgb(10, 10, 10);
            color: #fff;
        }
        body.dark-mode footer {
            border-top-color: #666;
            color: #fff;
        }
        body.light-mode {
            background-color: rgb(255, 255, 255);
            color: #010101;
        }
        body.light-mode footer {
            color: #020202;
        }
        .play-icon {
            width: 0.8em;
        }
        .menu {
            display: flex;
            justify-content: center;
            margin-bottom: 2vw;
        }
        .menu a {
            margin: 0 1vw;
        }
        .menu a[href="index.html"] {
            text-decoration: underline;
            font-weight: bold;
        }
        main {
            max-width: 72rem;
            margin: 0 auto;
        }
        section {
            margin: 0 15vw;
        }
        .hero {
            height: 100dvh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            padding: 0;
        }
        #logo-canvas {
            width: min(74vw, 34rem);
            height: min(74vw, 34rem);
            display: block;
        }
        header, footer {
            display: none;
        }
        .ui-date,
        .ui-time {
            position: fixed;
            top: clamp(18px, 2.5vw, 26px);
            font-size: clamp(0.58rem, 1.1vw, 0.76rem);
            letter-spacing: 0.12em;
            text-transform: uppercase;
            opacity: 0.55;
            white-space: nowrap;
        }
        .ui-date {
            left: clamp(18px, 3vw, 28px);
        }
        .ui-time {
            right: clamp(18px, 3vw, 28px);
        }
        .ui-bottom {
            position: fixed;
            bottom: clamp(18px, 3vw, 32px);
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            white-space: nowrap;
        }
        .ui-name {
            font-size: clamp(0.6rem, 1.4vw, 0.88rem);
            letter-spacing: 0.4em;
            text-transform: uppercase;
            text-indent: 0.4em;
            opacity: 0.8;
        }
        .ui-info-link {
            display: block;
            margin-top: 0;
            font-size: clamp(0.52rem, 1vw, 0.7rem);
            letter-spacing: 0.3em;
            text-transform: uppercase;
            text-decoration: none;
            opacity: 0.5;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        .ui-info-link:hover {
            opacity: 0.8;
        }
        .info-text {
            position: fixed;
            bottom: clamp(75px, 9vw, 105px);
            left: 50%;
            transform: translateX(-50%);
            max-width: 28rem;
            padding: 0 2rem;
            font-size: clamp(0.62rem, 1.1vw, 0.8rem);
            line-height: 1.8;
            text-align: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s ease;
        }
        .info-text.active {
            opacity: 1;
            pointer-events: auto;
        }
        .info-text p {
            margin: 0 0 1em 0;
        }
        .ui-info-link, .theme-toggle {
            cursor: pointer;
        }
        .theme-toggle {
            position: fixed;
            bottom: clamp(18px, 3vw, 32px);
            right: clamp(18px, 3vw, 28px);
            font-size: clamp(0.52rem, 1vw, 0.7rem);
            letter-spacing: 0.3em;
            text-transform: uppercase;
            opacity: 0.5;
            z-index: 20;
        }
        .theme-toggle:hover {
            opacity: 0.8;
        }

        /* ── Star field ── */
        .stars {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }
        .stars canvas {
            width: 100%;
            height: 100%;
        }

        /* ── Dark mode glow behind the black hole ── */
        .hero-glow {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: min(90vw, 44rem);
            height: min(90vw, 44rem);
            border-radius: 50%;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.6s ease;
            background: radial-gradient(
                circle,
                rgba(255, 140, 50, 0.08) 0%,
                rgba(255, 100, 30, 0.04) 30%,
                rgba(255, 60, 10, 0.015) 55%,
                transparent 75%
            );
            z-index: 0;
        }
        body.dark-mode .hero-glow {
            opacity: 1;
        }

        @media (max-width: 768px) {
            section {
                margin: 0;
            }
            #logo-canvas {
                width: min(88vw, 26rem);
                height: min(88vw, 26rem);
            }
        }
    </style>
</head>
<body>
<div class="ui-date" id="ui-date"></div>
    <div class="ui-time" id="ui-time"></div>
    <div class="theme-toggle" id="theme-toggle">Light/Dark</div>
    <div class="ui-bottom">

    </div>

    <main>
        <section class="hero">
            <canvas id="logo-canvas" aria-label="Interactive 3D black hole"></canvas>
        </section>
    </main>
    <script type="module">
        import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.161.0/build/three.module.min.js';

        // Live date and clock
        const DAY_NAMES   = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
        const MONTH_NAMES = ['January','February','March','April','May','June','July','August','September','October','November','December'];
        const dateEl = document.getElementById('ui-date');
        const timeEl = document.getElementById('ui-time');
        function updateClock() {
            const now = new Date();
            if (dateEl) dateEl.textContent = `${DAY_NAMES[now.getDay()]}, ${MONTH_NAMES[now.getMonth()]} ${now.getDate()}`;
            if (timeEl) timeEl.textContent = `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}:${String(now.getSeconds()).padStart(2,'0')}`;
        }
        updateClock();
        setInterval(updateClock, 1000);

        // Info toggle
        const infoText = document.getElementById('info-text');
        const infoOpen = document.getElementById('info-open');
        infoOpen.addEventListener('click', () => {
            infoText.classList.toggle('active');
        });
        document.addEventListener('click', e => {
            if (!infoText.classList.contains('active')) return;
            if (infoText.contains(e.target) || infoOpen.contains(e.target)) return;
            infoText.classList.remove('active');
        });

        // Theme toggle
        let manualTheme = null;
        document.getElementById('theme-toggle').addEventListener('click', () => {
            manualTheme = !document.body.classList.contains('dark-mode');
            idleFadeStarted = false;
            idleFadeCommitted = false;
            setThemeTransition(0.3);
            applyTheme(manualTheme);
        });

        // ── Idle cursor → permanent fade to dark mode ──
        let idleTimer = null;
        let idleFadeStarted = false;
        let idleFadeCommitted = false;
        const IDLE_TIMEOUT = 10000;
        const IDLE_FADE_DURATION = 18; // seconds
        const IDLE_COMMIT_TIME = IDLE_FADE_DURATION * 0.5 * 1000; // halfway = committed

        function setThemeTransition(seconds) {
            document.body.style.transition = `background-color ${seconds}s, color ${seconds}s`;
        }

        function startIdleTimer() {
            clearTimeout(idleTimer);
            // If fade already committed, do nothing
            if (idleFadeCommitted) return;
            // If fading but not yet committed, revert
            if (idleFadeStarted) {
                idleFadeStarted = false;
                setThemeTransition(2);
                applyTheme(manualTheme !== null ? manualTheme : darkMQ.matches);
            }
            idleTimer = setTimeout(() => {
                if (idleFadeCommitted) return;
                if (!document.body.classList.contains('dark-mode')) {
                    idleFadeStarted = true;
                    setThemeTransition(IDLE_FADE_DURATION);
                    applyTheme(true);
                    // After halfway, commit permanently
                    setTimeout(() => {
                        if (idleFadeStarted) {
                            idleFadeCommitted = true;
                            manualTheme = true;
                        }
                    }, IDLE_COMMIT_TIME);
                }
            }, IDLE_TIMEOUT);
        }

        document.addEventListener('pointermove', () => startIdleTimer());
        document.addEventListener('pointerdown', () => startIdleTimer());
        document.addEventListener('keydown', () => startIdleTimer());
        startIdleTimer();

        // Three.js: 3D black hole scene
        const canvas = document.getElementById('logo-canvas');
        const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.outputColorSpace = THREE.SRGBColorSpace;

        const scene = new THREE.Scene();
        const frustum = 1.5;
        const camera = new THREE.OrthographicCamera(-frustum, frustum, frustum, -frustum, 0.1, 50);
        camera.position.set(0, 0, 20);

        function resizeRenderer() {
            const s = canvas.offsetWidth || Math.round(window.innerWidth <= 768
                ? Math.min(window.innerWidth * 0.88, 416)
                : Math.min(window.innerWidth * 0.74, 544));
            renderer.setSize(s, s, false);
        }
        resizeRenderer();
        window.addEventListener('resize', resizeRenderer);

        const group = new THREE.Group();
        scene.add(group);

        // ── Canvas-painted accretion disk texture ──
        function createDiskTexture(size) {
            const c = document.createElement('canvas');
            c.width = c.height = size;
            const ctx = c.getContext('2d');
            const cx = size / 2, cy = size / 2;
            const img = ctx.createImageData(size, size);
            const d = img.data;
            const riBase = 0.22, ro = 0.92;

            for (let py = 0; py < size; py++) {
                for (let px = 0; px < size; px++) {
                    const dx = px - cx, dy = py - cy;
                    const r = Math.sqrt(dx * dx + dy * dy) / (size / 2);
                    const angle = Math.atan2(dy, dx);

                    // Gravitational lensing — inner edge bends toward the sphere
                    // Light from behind the hole bends around it, creating a tighter
                    // inner edge where the disk wraps closest to the shadow
                    const lensing = 0.07 * Math.cos(angle * 2 + 0.5);
                    const ri = riBase - lensing;

                    // Spiral-wisp outer edge
                    const spiral = angle + r * 12;
                    const edgeNoise = 0.02 * Math.sin(spiral * 3) +
                                      0.01 * Math.sin(spiral * 7 + 1.5);
                    const roLocal = ro + edgeNoise;

                    if (r < ri || r > roLocal) continue;
                    const t = (r - ri) / (roLocal - ri);       // 0 inner → 1 outer
                    let temp = Math.pow(1 - t, 0.55);          // very slow falloff — stays orange/yellow to the edge

                    // Doppler beaming — subtle asymmetry
                    const doppler = Math.cos(angle - 0.6);
                    temp *= 1 + 0.25 * doppler;

                    // Turbulence — organic streaks
                    temp *= 0.86 + 0.14 * (
                        Math.sin(angle * 6 + r * 35) *
                        Math.cos(angle * 4 - r * 22) +
                        Math.sin(angle * 14 + r * 55) * 0.25
                    );

                    temp = Math.max(0, Math.min(1.5, temp));

                    // Temperature → colour (boosted inner brightness)
                    let R, G, B;
                    if (temp > 1.1) {
                        R = 255; G = 250; B = 240;             // overexposed white
                    } else if (temp > 0.85) {
                        const u = (temp - 0.85) / 0.25;
                        R = 255; G = 220 + u * 30; B = 160 + u * 80;
                    } else if (temp > 0.6) {
                        const u = (temp - 0.6) / 0.25;
                        R = 255; G = 130 + u * 90; B = 30 + u * 130;
                    } else if (temp > 0.35) {
                        const u = (temp - 0.35) / 0.25;
                        R = 200 + u * 55; G = 50 + u * 80; B = 5 + u * 25;
                    } else if (temp > 0.15) {
                        const u = (temp - 0.15) / 0.2;
                        R = 100 + u * 100; G = 10 + u * 40; B = u * 5;
                    } else {
                        const u = temp / 0.15;
                        R = u * 100; G = u * 10; B = 0;
                    }

                    // Doppler colour shift — blueshift approaching, redshift receding
                    const shift = doppler * 0.3 * (1 - t);
                    if (shift > 0) {
                        // Approaching: push toward blue/white
                        B = Math.min(255, B + shift * 600);
                        G = Math.min(255, G + shift * 200);
                    } else {
                        // Receding: push toward deeper red
                        R = Math.min(255, R - shift * 300);
                        G = Math.max(0, G + shift * 200);
                        B = Math.max(0, B + shift * 100);
                    }

                    // Alpha: fully opaque, then fade out at the edge
                    let A = 255;
                    if (t < 0.03) A *= t / 0.03;
                    if (t > 0.75) A *= Math.pow((1 - t) / 0.25, 5);

                    const idx = (py * size + px) * 4;
                    d[idx]     = Math.min(255, R | 0);
                    d[idx + 1] = Math.min(255, G | 0);
                    d[idx + 2] = Math.min(255, B | 0);
                    d[idx + 3] = Math.min(255, A | 0);
                }
            }
            ctx.putImageData(img, 0, 0);
            const tex = new THREE.CanvasTexture(c);
            tex.colorSpace = THREE.SRGBColorSpace;
            tex.generateMipmaps = false;
            tex.minFilter = THREE.LinearFilter;
            tex.magFilter = THREE.LinearFilter;
            tex.center.set(0.5, 0.5); // rotate around center
            return tex;
        }

        // ── Scene geometry ──

        // Event horizon — pure black sphere
        group.add(new THREE.Mesh(
            new THREE.SphereGeometry(0.62, 64, 64),
            new THREE.MeshBasicMaterial({ color: 0x000000 })
        ));

        // Accretion disk
        const diskTex = createDiskTexture(1024);
        const diskMesh = new THREE.Mesh(
            new THREE.CircleGeometry(2.2, 128),
            new THREE.MeshBasicMaterial({
                map: diskTex,
                transparent: true,
                side: THREE.DoubleSide,
                depthWrite: false
            })
        );
        diskMesh.rotation.x = -Math.PI / 2;
        group.add(diskMesh);

        // Spiral flow overlay — rotates faster to give depth to the accretion flow
        function createFlowTexture(size) {
            const c = document.createElement('canvas');
            c.width = c.height = size;
            const ctx = c.getContext('2d');
            const cx = size / 2, cy = size / 2;
            const img = ctx.createImageData(size, size);
            const d = img.data;
            const ri = 0.20, ro = 0.88;

            for (let py = 0; py < size; py++) {
                for (let px = 0; px < size; px++) {
                    const dx = px - cx, dy = py - cy;
                    const r = Math.sqrt(dx * dx + dy * dy) / (size / 2);
                    if (r < ri || r > ro) continue;
                    const angle = Math.atan2(dy, dx);
                    const t = (r - ri) / (ro - ri);

                    // Tight spiral arms
                    const spiral = angle + r * 18;
                    const arm = Math.pow(Math.max(0, Math.sin(spiral * 2)), 3);
                    // Clumps
                    const clump = 0.5 + 0.5 * Math.sin(angle * 8 + r * 40)
                                * Math.cos(angle * 5 - r * 25);

                    let brightness = arm * clump * (1 - t) * 0.6;
                    if (t < 0.05) brightness *= t / 0.05;
                    if (t > 0.8) brightness *= (1 - t) / 0.2;

                    const R = 255, G = Math.round(160 + brightness * 60), B = Math.round(80 + brightness * 40);
                    const A = Math.min(255, brightness * 255);

                    const idx = (py * size + px) * 4;
                    d[idx] = R; d[idx+1] = G; d[idx+2] = B; d[idx+3] = A | 0;
                }
            }
            ctx.putImageData(img, 0, 0);
            const tex = new THREE.CanvasTexture(c);
            tex.colorSpace = THREE.SRGBColorSpace;
            tex.generateMipmaps = false;
            tex.minFilter = THREE.LinearFilter;
            tex.center.set(0.5, 0.5);
            return tex;
        }

        const flowTex = createFlowTexture(1024);
        const flowMesh = new THREE.Mesh(
            new THREE.CircleGeometry(2.2, 128),
            new THREE.MeshBasicMaterial({
                map: flowTex,
                transparent: true,
                side: THREE.DoubleSide,
                depthWrite: false,
                opacity: 0.35,
            })
        );
        flowMesh.rotation.x = -Math.PI / 2;
        flowMesh.position.y = 0.001; // slight offset to avoid z-fighting
        group.add(flowMesh);

        group.scale.setScalar(0.55);

        // ── Star field (declare early so applyTheme can call drawStars) ──
        const starsCanvas = document.getElementById('stars-canvas');
        const starsCtx = starsCanvas.getContext('2d');
        const starLayers = [
            { speed: 1.15, stars: [] },  // near
            { speed: 1.0, stars: [] },   // mid
            { speed: 0.85, stars: [] },  // far
        ];

        // ── Event state (declared early to avoid TDZ in animate) ──
        let supernovae = [];
        let lastNovaTime = 0;
        let nextNovaWait = 3000 + Math.random() * 12000;

        // ── Distant galaxy (on celestial sphere) ──
        const galaxy = {
            theta: 0.8 + Math.random() * 3,
            phi: 0.7 + Math.random() * 1.6,
            rotation: Math.random() * Math.PI * 2,
            size: 14 + Math.random() * 8,
            layerSpeed: 0.85,
        };

        // ── Nebula wisps (on celestial sphere) ──
        const nebulae = [];
        for (let i = 0; i < 5; i++) {
            nebulae.push({
                theta: Math.random() * Math.PI * 2,
                phi: Math.acos(2 * Math.random() - 1),
                size: 25 + Math.random() * 35,
                r: Math.random() < 0.5 ? 100 + Math.random() * 80 : 50 + Math.random() * 40,
                g: 20 + Math.random() * 60,
                b: 120 + Math.random() * 135,
                opacity: 0.025 + Math.random() * 0.035,
                driftTheta: (Math.random() - 0.5) * 0.00004,
                driftPhi: (Math.random() - 0.5) * 0.00002,
                layerSpeed: 0.85,
            });
        }

        // ── Hawking radiation particles ──
        let hawkingParticles = [];
        let lastHawkingSpawn = 0;

        // ── Binary star system (on celestial sphere) ──
        const binaryStar = {
            theta: Math.random() * Math.PI * 2,
            phi: Math.acos(2 * Math.random() - 1),
            orbitAngle: 0,
            separation: 0.018,
            layerSpeed: 1.0,
            sizeA: 0.8 + Math.random() * 0.4,
            sizeB: 0.5 + Math.random() * 0.3,
            opacityA: 0.5 + Math.random() * 0.3,
            opacityB: 0.35 + Math.random() * 0.25,
        };


        // ── Lock-on mode state ──
        let lockTarget = null;       // { layerIdx, starIdx, screenX, screenY }
        let lockHoverStart = 0;      // when cursor first hovered near a star
        let lockHoverStar = null;    // which star we're timing
        let lockActive = false;      // fully locked on
        let lockFadeIn = 0;          // 0→1 animation progress
        const LOCK_TIME = 1000;      // 1 second to lock
        const LOCK_RADIUS = 25;      // pixel proximity to trigger lock
        const STAR_CLASSES = ['O2V','B1III','A3V','F5IV','G2V','K4III','M1V','M8V','A0Ia','B3II','F8V','K7V','G0IV','O9V'];
        const STAR_NAMES = ['Aethon','Velar','Krios','Nythis','Ondra','Pyxar','Solwen','Thuris','Xelion','Yrith','Zephon','Calyx','Draven','Elyon','Ferox'];


        // ── Pale blue dot — one star is "Sol" ──
        let paleBlueDotStar = null; // assigned after generateStars()

        // ── Exodus fleet (tiny dots moving star-to-star) ──
        let exodusFleet = null;
        let exodusSpawnTime = 15000 + Math.random() * 30000; // first fleet 15-45s in
        let exodusScreenPos = null; // { x, y } in canvas pixels for lock-on

        // ── Von Neumann probes (hops star-to-star) ──
        let vonNeumannProbes = [];
        let vonNeumannNextSpawn = 20000 + Math.random() * 20000; // first probe 20-40s in
        const VON_NEUMANN_MAX = 3; // up to 3 simultaneous probes
        let vonNeumannScreenPositions = []; // array of { x, y } for lock-on

        // ── Dyson Swarm — orbiting dots around a host star ──
        let dysonSwarmStar = null; // { layerIdx, starIdx } set after generateStars
        let dysonScreenPos = null;

        // ── Ringworld — edge-on ring visible around a star ──
        let ringworldStar = null;
        let ringworldScreenPos = null;

        // ── Stellar Engine — star drifting through the field ──
        const stellarEngine = {
            theta: Math.random() * Math.PI * 2,

        function generateStars() {
            const w = starsCanvas.width = window.innerWidth * window.devicePixelRatio;
            const h = starsCanvas.height = window.innerHeight * window.devicePixelRatio;
            starsCanvas.style.width = window.innerWidth + 'px';
            starsCanvas.style.height = window.innerHeight + 'px';

            for (const layer of starLayers) layer.stars = [];

            for (let i = 0; i < 5000; i++) {
                const theta = Math.random() * 2 * Math.PI;
                const phi = Math.acos(2 * Math.random() - 1);

                const size = Math.random() < 0.05
                    ? 1.5 + Math.random() * 1.0
                    : 0.4 + Math.random() * 0.8;
                const opacity = 0.15 + Math.random() * 0.4;

                // Twinkle phase offset (unique per star)
                const twinkleOffset = Math.random() * 1000;

                // Assign to depth layer: 15% near, 35% mid, 50% far
                const roll = Math.random();
                const layerIdx = roll < 0.15 ? 0 : roll < 0.5 ? 1 : 2;
                starLayers[layerIdx].stars.push({ theta, phi, size, opacity, twinkleOffset });
            }
        }

        function drawStars(isDark, viewRotX = 0, viewRotY = 0, time = 0) {
            const w = starsCanvas.width, h = starsCanvas.height;
            starsCtx.clearRect(0, 0, w, h);
            if (!isDark) return;
            const cx = w / 2, cy = h / 2;
            const fov = Math.min(w, h) * 0.55;
            const canvasR = canvas.getBoundingClientRect();
            const horizonR = (canvasR.width * window.devicePixelRatio) * 0.62 * 0.55 / (frustum * 2);
            const lensR = horizonR * 3.2;

            for (const layer of starLayers) {
                const rotX = viewRotX * layer.speed;
                const rotYL = viewRotY * layer.speed;
                const cosY = Math.cos(rotYL), sinY = Math.sin(rotYL);
                const cosX = Math.cos(rotX), sinX = Math.sin(rotX);

                for (const star of layer.stars) {
                    if (star.dead) continue;
                    const sp = Math.sin(star.phi);
                    const x = sp * Math.cos(star.theta);
                    const y = Math.cos(star.phi);
                    const z = sp * Math.sin(star.theta);

                    const x1 = x * cosY - z * sinY;
                    const z1 = x * sinY + z * cosY;
                    const y2 = y * cosX - z1 * sinX;
                    const z2 = y * sinX + z1 * cosX;

                    if (z2 < 0.4) continue;

                    let sx = cx + (x1 / z2) * fov;
                    let sy = cy - (y2 / z2) * fov;

                    if (sx < -20 || sx > w + 20 || sy < -20 || sy > h + 20) continue;

                    // Gravitational lensing
                    const dx = sx - cx, dy = sy - cy;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist > lensR * 0.5 && dist < lensR * 3) {
                        const strength = (lensR * lensR) / (dist * dist);
                        const clamped = Math.min(strength, 8);
                        sx += (dx / dist) * clamped * 0.6;
                        sy += (dy / dist) * clamped * 0.6;
                    }

                    const finalDist = Math.sqrt((sx - cx) ** 2 + (sy - cy) ** 2);
                    if (finalDist < horizonR) continue;

                    let alpha = star.opacity;
                    if (finalDist < horizonR * 2.5) {
                        alpha *= (finalDist - horizonR) / (horizonR * 1.5);
                    }
                    alpha *= Math.min(1, z2 * 4);

                    // Twinkling — subtle scintillation
                    const twinkle = 0.7 + 0.3 * Math.sin(time * 0.002 + star.twinkleOffset)
                                  * Math.sin(time * 0.0037 + star.twinkleOffset * 1.7);
                    alpha *= twinkle;

                    if (alpha < 0.01) continue;

                    if (isDark) {
                        if (star.paleBlueDot) {
                            starsCtx.fillStyle = `rgba(70, 130, 255, ${Math.min(1, alpha * 2)})`;
                        } else {
                            starsCtx.fillStyle = `rgba(255, 255, 255, ${alpha})`;
                        }
                    } else {
                        starsCtx.fillStyle = `rgba(0, 0, 0, ${alpha * 0.25})`;
                    }
                    starsCtx.beginPath();
                    starsCtx.arc(sx, sy, star.size, 0, Math.PI * 2);
                    starsCtx.fill();
                }
            }
        }

        function drawSupernovae(time, w, h, isDark, viewRotX, viewRotY) {
            if (!isDark) return;
            const cx = w / 2, cy = h / 2;
            const fov = Math.min(w, h) * 0.55;

            for (let i = supernovae.length - 1; i >= 0; i--) {
                const nova = supernovae[i];
                const age = time - nova.born;
                if (age > nova.duration) { supernovae.splice(i, 1); continue; }

                // Project from celestial sphere — same as stars
                const rX = viewRotX * nova.layerSpeed;
                const rY = viewRotY * nova.layerSpeed;
                const cosY = Math.cos(rY), sinY = Math.sin(rY);
                const cosX = Math.cos(rX), sinX = Math.sin(rX);

                const sp = Math.sin(nova.phi);
                const x = sp * Math.cos(nova.theta);
                const y = Math.cos(nova.phi);
                const z = sp * Math.sin(nova.theta);

                const x1 = x * cosY - z * sinY;
                const z1 = x * sinY + z * cosY;
                const y2 = y * cosX - z1 * sinX;
                const z2 = y * sinX + z1 * cosX;

                if (z2 < 0.4) continue;

                const sx = cx + (x1 / z2) * fov;
                const sy = cy - (y2 / z2) * fov;

                if (sx < -50 || sx > w + 50 || sy < -50 || sy > h + 50) continue;

                const t = age / nova.duration;
                const brightness = t < 0.1 ? t / 0.1 : Math.pow(1 - (t - 0.1) / 0.9, 2);
                const radius = nova.maxRadius * (0.3 + t * 0.7);

                // Gravitational interaction with the black hole
                const dxBH = sx - cx, dyBH = sy - cy;
                const distBH = Math.sqrt(dxBH * dxBH + dyBH * dyBH);
                const bhScreenRDim = getHorizonRadius();
                const horizonR = bhScreenRDim;
                const lensR = bhScreenRDim * 3.2;

                // Black hole absorbs light — cull inside horizon, dim near it
                if (distBH < bhScreenRDim) continue;
                let alpha = brightness;
                if (distBH < bhScreenRDim * 1.5) {
                    alpha *= Math.max(0, (distBH - bhScreenRDim) / (bhScreenRDim * 0.5));
                }

                if (alpha < 0.01) continue;

                // Gravitational lensing — bend supernova position away from center
                let drawX = sx, drawY = sy;
                if (distBH > 1 && distBH < lensR * 3) {
                    const strength = (lensR * lensR) / (distBH * distBH);
                    const clamped = Math.min(strength, 8);
                    drawX += (dxBH / distBH) * clamped * 0.6;
                    drawY += (dyBH / distBH) * clamped * 0.6;
                }

                // Clip around the event horizon — don't paint over the black hole
                // Use the actual on-screen black hole radius (matches the Three.js sphere)
                const canvasRect = canvas.getBoundingClientRect();
                const bhScreenR = (canvasRect.width * window.devicePixelRatio) * 0.62 * 0.55 / (frustum * 2) * 1.05;
                starsCtx.save();
                starsCtx.beginPath();
                starsCtx.rect(0, 0, w, h);
                starsCtx.arc(cx, cy, bhScreenR, 0, Math.PI * 2, true);
                starsCtx.clip();

                // Blackbody temperature decay: ~30000K → ~8000K → ~4000K → ~2000K
                // Starts blue-white regardless of type, cools through yellow/orange to red remnant
                const temp = 1 - Math.pow(t, 0.5); // 1 = peak (hot), 0 = expired (cold)
                let cr, cg, cb; // core color
                let hr, hg, hb; // halo color
                if (temp > 0.8) {
                    // ~30000K+ blue-white
                    const u = (temp - 0.8) / 0.2;
                    cr = 200 + 55 * u; cg = 210 + 45 * u; cb = 255;
                    hr = 150 + 50 * u; hg = 170 + 40 * u; hb = 255;
                } else if (temp > 0.55) {
                    // ~8000K white-yellow
                    const u = (temp - 0.55) / 0.25;
                    cr = 255; cg = 220 + u * (210 - 220); cb = 160 + u * 95;
                    hr = 255; hg = 180 + u * 30; hb = 100 + u * 70;
                } else if (temp > 0.3) {
                    // ~4000K orange
                    const u = (temp - 0.3) / 0.25;
                    cr = 255; cg = 140 + u * 80; cb = 40 + u * 120;
                    hr = 220 + u * 35; hg = 80 + u * 100; hb = 10 + u * 90;
                } else {
                    // ~2000K deep red remnant, blend toward random palette
                    const u = temp / 0.3;
                    cr = Math.round(nova.r2 * (1 - u) + 255 * u);
                    cg = Math.round(nova.g2 * 0.3 * (1 - u) + 140 * u);
                    cb = Math.round(nova.b2 * 0.2 * (1 - u) + 40 * u);
                    hr = Math.round(nova.r2 * 0.8 * (1 - u) + 220 * u);
                    hg = Math.round(nova.g2 * 0.2 * (1 - u) + 80 * u);
                    hb = Math.round(nova.b2 * 0.1 * (1 - u) + 10 * u);
                }

                const grad = starsCtx.createRadialGradient(drawX, drawY, 0, drawX, drawY, radius * 5);
                grad.addColorStop(0, `rgba(${Math.round(cr)}, ${Math.round(cg)}, ${Math.round(cb)}, ${alpha})`);
                grad.addColorStop(0.3, `rgba(${Math.round(hr)}, ${Math.round(hg)}, ${Math.round(hb)}, ${alpha * 0.6})`);
                grad.addColorStop(0.6, `rgba(${Math.round(hr)}, ${Math.round(hg)}, ${Math.round(hb)}, ${alpha * 0.2})`);
                grad.addColorStop(1, `rgba(${Math.round(hr)}, ${Math.round(hg)}, ${Math.round(hb)}, 0)`);
                starsCtx.fillStyle = grad;
                starsCtx.beginPath();
                starsCtx.arc(drawX, drawY, radius * 5, 0, Math.PI * 2);
                starsCtx.fill();

                starsCtx.restore();
            }
        }


        // ── Distant galaxy drawing ──
        function drawGalaxy(time, w, h, isDark, viewRotX, viewRotY) {
            if (!isDark) return;
            const cx = w / 2, cy = h / 2;
            const fov = Math.min(w, h) * 0.55;

            const rX = viewRotX * galaxy.layerSpeed;
            const rY = viewRotY * galaxy.layerSpeed;
            const cosY = Math.cos(rY), sinY = Math.sin(rY);
            const cosX = Math.cos(rX), sinX = Math.sin(rX);

            const sp = Math.sin(galaxy.phi);
            const x = sp * Math.cos(galaxy.theta);
            const y = Math.cos(galaxy.phi);
            const z = sp * Math.sin(galaxy.theta);

            const x1 = x * cosY - z * sinY;
            const z1 = x * sinY + z * cosY;
            const y2 = y * cosX - z1 * sinX;
            const z2 = y * sinX + z1 * cosX;

            if (z2 < 0.3) return;

            const sx = cx + (x1 / z2) * fov;
            const sy = cy - (y2 / z2) * fov;
            if (sx < -60 || sx > w + 60 || sy < -60 || sy > h + 60) return;
            if (isOccludedByHole(sx, sy)) return;

            galaxy.rotation += 0.0003;
            const dpr = window.devicePixelRatio;
            const size = galaxy.size * dpr;

            starsCtx.save();
            starsCtx.translate(sx, sy);
            starsCtx.rotate(galaxy.rotation);
            starsCtx.globalAlpha = 0.12 * Math.min(1, z2 * 3);

            // Draw spiral arms as soft elliptical smudges
            for (let arm = 0; arm < 2; arm++) {
                const armAngle = arm * Math.PI;
                for (let j = 0; j < 8; j++) {
                    const t = j / 8;
                    const spiralR = size * (0.15 + t * 0.85);
                    const angle = armAngle + t * 2.5;
                    const bx = Math.cos(angle) * spiralR;
                    const by = Math.sin(angle) * spiralR * 0.5;
                    const blobSize = size * (0.2 - t * 0.1);
                    const grad = starsCtx.createRadialGradient(bx, by, 0, bx, by, blobSize);
                    grad.addColorStop(0, `rgba(220, 200, 255, ${0.15 - t * 0.1})`);
                    grad.addColorStop(1, 'rgba(180, 160, 220, 0)');
                    starsCtx.fillStyle = grad;
                    starsCtx.beginPath();
                    starsCtx.arc(bx, by, blobSize, 0, Math.PI * 2);
                    starsCtx.fill();
                }
            }
            // Central bulge
            const bulge = starsCtx.createRadialGradient(0, 0, 0, 0, 0, size * 0.25);
            bulge.addColorStop(0, 'rgba(255, 240, 220, 0.3)');
            bulge.addColorStop(0.5, 'rgba(255, 220, 180, 0.1)');
            bulge.addColorStop(1, 'rgba(200, 180, 220, 0)');
            starsCtx.fillStyle = bulge;
            starsCtx.beginPath();
            starsCtx.arc(0, 0, size * 0.25, 0, Math.PI * 2);
            starsCtx.fill();

            starsCtx.restore();
        }

        // ── Nebula wisps drawing ──
        function drawNebulae(time, w, h, isDark, viewRotX, viewRotY) {
            if (!isDark) return;
            const cx = w / 2, cy = h / 2;
            const fov = Math.min(w, h) * 0.55;
            const dpr = window.devicePixelRatio;

            for (const neb of nebulae) {
                // Slow drift
                neb.theta += neb.driftTheta;
                neb.phi += neb.driftPhi;
                // Bounce phi to stay in range
                if (neb.phi < 0.1 || neb.phi > Math.PI - 0.1) neb.driftPhi *= -1;

                const rX = viewRotX * neb.layerSpeed;
                const rY = viewRotY * neb.layerSpeed;
                const cosY = Math.cos(rY), sinY = Math.sin(rY);
                const cosX = Math.cos(rX), sinX = Math.sin(rX);

                const sp = Math.sin(neb.phi);
                const x = sp * Math.cos(neb.theta);
                const y = Math.cos(neb.phi);
                const z = sp * Math.sin(neb.theta);

                const x1 = x * cosY - z * sinY;
                const z1 = x * sinY + z * cosY;
                const y2 = y * cosX - z1 * sinX;
                const z2 = y * sinX + z1 * cosX;

                if (z2 < 0.2) continue;

                const sx = cx + (x1 / z2) * fov;
                const sy = cy - (y2 / z2) * fov;
                if (sx < -100 || sx > w + 100 || sy < -100 || sy > h + 100) continue;
                if (isOccludedByHole(sx, sy)) continue;

                const size = neb.size * dpr;
                const alpha = neb.opacity * Math.min(1, z2 * 2);

                // Soft colored cloud
                const grad = starsCtx.createRadialGradient(sx, sy, 0, sx, sy, size);
                grad.addColorStop(0, `rgba(${neb.r}, ${neb.g}, ${neb.b}, ${alpha})`);
                grad.addColorStop(0.4, `rgba(${neb.r}, ${neb.g}, ${neb.b}, ${alpha * 0.5})`);
                grad.addColorStop(1, `rgba(${neb.r}, ${neb.g}, ${neb.b}, 0)`);
                starsCtx.fillStyle = grad;
                starsCtx.beginPath();
                starsCtx.arc(sx, sy, size, 0, Math.PI * 2);
                starsCtx.fill();
            }
        }

        // ── Hawking radiation ──
        function updateHawkingRadiation(time, w, h, isDark) {
            if (!isDark) return;
            const cx = w / 2, cy = h / 2;
            const bhRadius = Math.min(w, h) * 0.055;
            const dpr = window.devicePixelRatio;

            // Spawn new particles
            if (time - lastHawkingSpawn > 200 + Math.random() * 300) {
                lastHawkingSpawn = time;
                const angle = Math.random() * Math.PI * 2;
                const spawnR = bhRadius * (1.0 + Math.random() * 0.3);
                hawkingParticles.push({
                    x: cx + Math.cos(angle) * spawnR,
                    y: cy + Math.sin(angle) * spawnR,
                    vx: Math.cos(angle) * (0.3 + Math.random() * 0.5) * dpr,
                    vy: Math.sin(angle) * (0.3 + Math.random() * 0.5) * dpr,
                    born: time,
                    life: 800 + Math.random() * 1200,
                    size: (0.3 + Math.random() * 0.5) * dpr,
                });
            }

            // Draw and update
            for (let i = hawkingParticles.length - 1; i >= 0; i--) {
                const p = hawkingParticles[i];
                const age = time - p.born;
                if (age > p.life) { hawkingParticles.splice(i, 1); continue; }

                p.x += p.vx;
                p.y += p.vy;
                // Slight curve away
                p.vx *= 0.995;
                p.vy *= 0.995;

                const t = age / p.life;
                const alpha = t < 0.1 ? t / 0.1 : (1 - (t - 0.1) / 0.9);
                alpha * 0.4; // faint

                starsCtx.fillStyle = `rgba(200, 220, 255, ${alpha * 0.35})`;
                starsCtx.beginPath();
                starsCtx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                starsCtx.fill();
            }

            // Cap particle count
            if (hawkingParticles.length > 60) hawkingParticles.splice(0, hawkingParticles.length - 60);
        }

        // ── Binary star system ──
        function drawBinarySystem(time, w, h, isDark, viewRotX, viewRotY) {
            if (!isDark) return;
            const cx = w / 2, cy = h / 2;
            const fov = Math.min(w, h) * 0.55;
            const dpr = window.devicePixelRatio;

            binaryStar.orbitAngle += 0.002;

            // Project center of mass
            const rX = viewRotX * binaryStar.layerSpeed;
            const rY = viewRotY * binaryStar.layerSpeed;
            const cosY = Math.cos(rY), sinY = Math.sin(rY);
            const cosX = Math.cos(rX), sinX = Math.sin(rX);

            const sp = Math.sin(binaryStar.phi);
            const x = sp * Math.cos(binaryStar.theta);
            const y = Math.cos(binaryStar.phi);
            const z = sp * Math.sin(binaryStar.theta);

            const x1 = x * cosY - z * sinY;
            const z1 = x * sinY + z * cosY;
            const y2 = y * cosX - z1 * sinX;
            const z2 = y * sinX + z1 * cosX;

            if (z2 < 0.4) return;

            const screenCX = cx + (x1 / z2) * fov;
            const screenCY = cy - (y2 / z2) * fov;
            if (screenCX < -30 || screenCX > w + 30 || screenCY < -30 || screenCY > h + 30) return;
            if (isOccludedByHole(screenCX, screenCY)) return;

            const sep = binaryStar.separation * fov;
            const angle = binaryStar.orbitAngle;
            const alpha = Math.min(1, z2 * 3);

            // Star A (larger, warmer)
            const ax = screenCX + Math.cos(angle) * sep;
            const ay = screenCY + Math.sin(angle) * sep * 0.6; // slight tilt
            starsCtx.fillStyle = `rgba(255, 240, 220, ${binaryStar.opacityA * alpha})`;
            starsCtx.beginPath();
            starsCtx.arc(ax, ay, binaryStar.sizeA * dpr, 0, Math.PI * 2);
            starsCtx.fill();

            // Star B (smaller, cooler)
            const bx = screenCX - Math.cos(angle) * sep;
            const by = screenCY - Math.sin(angle) * sep * 0.6;
            starsCtx.fillStyle = `rgba(200, 220, 255, ${binaryStar.opacityB * alpha})`;
            starsCtx.beginPath();
            starsCtx.arc(bx, by, binaryStar.sizeB * dpr, 0, Math.PI * 2);
            starsCtx.fill();

            // Faint glow connecting them
            starsCtx.strokeStyle = `rgba(220, 220, 255, ${0.04 * alpha})`;
            starsCtx.lineWidth = 0.5 * dpr;
            starsCtx.beginPath();
            starsCtx.moveTo(ax, ay);
            starsCtx.lineTo(bx, by);
            starsCtx.stroke();
        }

        // ── Shared: black hole occlusion check ──
        function getHorizonRadius() {
            const canvasR = canvas.getBoundingClientRect();
            return (canvasR.width * window.devicePixelRatio) * 0.62 * 0.55 / (frustum * 2);
        }
        function isOccludedByHole(sx, sy) {
            const w = starsCanvas.width, h = starsCanvas.height;
            const cx = w / 2, cy = h / 2;
            const dx = sx - cx, dy = sy - cy;
            return Math.sqrt(dx * dx + dy * dy) < getHorizonRadius();
        }

        // ── Exodus fleet — tiny dots moving in formation between stars ──
        function projectStar(star, layerSpeed, viewRotX, viewRotY) {
            const w = starsCanvas.width, h = starsCanvas.height;
            const cx = w / 2, cy = h / 2;
            const fov = Math.min(w, h) * 0.55;
            const rX = viewRotX * layerSpeed, rY = viewRotY * layerSpeed;
            const cosY = Math.cos(rY), sinY = Math.sin(rY);
            const cosX = Math.cos(rX), sinX = Math.sin(rX);
            const sp = Math.sin(star.phi);
            const x = sp * Math.cos(star.theta), y = Math.cos(star.phi), z = sp * Math.sin(star.theta);
            const x1 = x * cosY - z * sinY;
            const z1 = x * sinY + z * cosY;
            const y2 = y * cosX - z1 * sinX;
            const z2 = y * sinX + z1 * cosX;
            if (z2 < 0.3) return null;
            return { x: cx + (x1 / z2) * fov, y: cy - (y2 / z2) * fov, z2 };
        }

        function pickRandomVisibleStar(viewRotX, viewRotY) {
            const w = starsCanvas.width, h = starsCanvas.height;
            for (let attempt = 0; attempt < 50; attempt++) {
                const li = Math.floor(Math.random() * 3);
                const layer = starLayers[li];
                if (layer.stars.length === 0) continue;
                const si = Math.floor(Math.random() * layer.stars.length);
                const star = layer.stars[si];
                if (star.dead) continue;
                const p = projectStar(star, layer.speed, viewRotX, viewRotY);
                if (p && p.x > 50 && p.x < w - 50 && p.y > 50 && p.y < h - 50) {
                    return { layerIdx: li, starIdx: si, star };
                }
            }
            return null;
        }

        function updateExodusFleet(now, w, h, isDark, viewRotX, viewRotY) {
            if (!isDark) return;

            // Spawn fleet
            if (!exodusFleet && now > exodusSpawnTime) {
                const from = pickRandomVisibleStar(viewRotX, viewRotY);
                const to = pickRandomVisibleStar(viewRotX, viewRotY);
                if (from && to && from.starIdx !== to.starIdx) {
                    exodusFleet = {
                        fromTheta: from.star.theta, fromPhi: from.star.phi,
                        toTheta: to.star.theta, toPhi: to.star.phi,
                        layerSpeed: starLayers[from.layerIdx].speed,
                        born: now,
                        duration: 50000 + Math.random() * 30000, // 50-80s to cross
                        ships: 5 + Math.floor(Math.random() * 4), // 5-8 ships
                    };
                }
            }

            if (!exodusFleet) { exodusScreenPos = null; return; }

            const fleet = exodusFleet;
            const age = now - fleet.born;
            if (age > fleet.duration) {
                exodusFleet = null; exodusScreenPos = null;
                exodusSpawnTime = now + 30000 + Math.random() * 60000; // next fleet in 30-90s
                return;
            }

            const dpr = window.devicePixelRatio;
            const cx = w / 2, cy = h / 2;
            const fov = Math.min(w, h) * 0.55;

            for (let s = 0; s < fleet.ships; s++) {
                // Stagger each ship slightly
                const shipT = Math.max(0, Math.min(1, (age - s * 800) / fleet.duration));
                if (shipT <= 0) continue;

                // Interpolate theta/phi along great circle
                const theta = fleet.fromTheta + (fleet.toTheta - fleet.fromTheta) * shipT;
                const phi = fleet.fromPhi + (fleet.toPhi - fleet.fromPhi) * shipT;

                // Project
                const rX = viewRotX * fleet.layerSpeed, rY = viewRotY * fleet.layerSpeed;
                const cosY = Math.cos(rY), sinY = Math.sin(rY);
                const cosX = Math.cos(rX), sinX = Math.sin(rX);
                const sp = Math.sin(phi);
                const x = sp * Math.cos(theta), y = Math.cos(phi), z = sp * Math.sin(theta);
                const x1 = x * cosY - z * sinY;
                const z1 = x * sinY + z * cosY;
                const y2 = y * cosX - z1 * sinX;
                const z2 = y * sinX + z1 * cosX;
                if (z2 < 0.3) continue;
                const sx = cx + (x1 / z2) * fov;
                const sy = cy - (y2 / z2) * fov;
                if (sx < -20 || sx > w + 20 || sy < -20 || sy > h + 20) continue;
                if (isOccludedByHole(sx, sy)) continue;

                // Fade in/out at endpoints
                let alpha = 0.7;
                if (shipT < 0.05) alpha *= shipT / 0.05;
                if (shipT > 0.95) alpha *= (1 - shipT) / 0.05;
                alpha *= Math.min(1, z2 * 3);

                // Formation: V-shape offset
                const formX = (s % 2 === 0 ? 1 : -1) * Math.ceil(s / 2) * 3 * dpr;
                const formY = Math.ceil(s / 2) * 2 * dpr;

                // Store lead ship position for lock-on
                if (s === 0) exodusScreenPos = { x: sx, y: sy };

                // Ship dot
                starsCtx.fillStyle = `rgba(220, 200, 170, ${alpha})`;
                starsCtx.beginPath();
                starsCtx.arc(sx + formX, sy + formY, 0.8 * dpr, 0, Math.PI * 2);
                starsCtx.fill();

                // Faint engine glow
                starsCtx.fillStyle = `rgba(255, 180, 80, ${alpha * 0.3})`;
                starsCtx.beginPath();
                starsCtx.arc(sx + formX, sy + formY, 2 * dpr, 0, Math.PI * 2);
                starsCtx.fill();
            }
        }

        // ── Von Neumann probes — hop from star to star ──
        function updateVonNeumann(now, w, h, isDark, viewRotX, viewRotY) {
            if (!isDark) return;
            vonNeumannScreenPositions = [];

            // Spawn new probes
            if (vonNeumannProbes.length < VON_NEUMANN_MAX && now > vonNeumannNextSpawn) {
                const from = pickRandomVisibleStar(viewRotX, viewRotY);
                if (from) {
                    vonNeumannProbes.push({
                        currentTheta: from.star.theta,
                        currentPhi: from.star.phi,
                        targetTheta: 0,
                        targetPhi: 0,
                        layerSpeed: starLayers[from.layerIdx].speed,
                        layerIdx: from.layerIdx,
                        hopStart: now,
                        hopDuration: 6000 + Math.random() * 4000,
                        hopsRemaining: 5 + Math.floor(Math.random() * 4),
                        pausing: false,
                        pauseUntil: 0,
                        needTarget: true,
                    });
                }
                vonNeumannNextSpawn = now + 15000 + Math.random() * 25000;
            }

            const dpr = window.devicePixelRatio;

            for (let vi = vonNeumannProbes.length - 1; vi >= 0; vi--) {
                const vn = vonNeumannProbes[vi];

                // Find a target star to hop to
                if (vn.needTarget) {
                    const layer = starLayers[vn.layerIdx];
                    let bestDist = Infinity, bestStar = null;
                    for (const star of layer.stars) {
                        if (star.dead) continue;
                        const dTheta = star.theta - vn.currentTheta;
                        const dPhi = star.phi - vn.currentPhi;
                        const d = Math.sqrt(dTheta * dTheta + dPhi * dPhi);
                        if (d > 0.1 && d < 0.8 && d < bestDist) {
                            bestDist = d;
                            bestStar = star;
                        }
                    }
                    if (bestStar) {
                        vn.targetTheta = bestStar.theta;
                        vn.targetPhi = bestStar.phi;
                        vn.needTarget = false;
                        vn.hopStart = now;
                        vn.hopDuration = 6000 + Math.random() * 4000;
                    } else {
                        vonNeumannProbes.splice(vi, 1);
                        continue;
                    }
                }

                // Pausing at a star
                if (vn.pausing) {
                    if (now > vn.pauseUntil) {
                        vn.pausing = false;
                        vn.hopsRemaining--;
                        if (vn.hopsRemaining <= 0) {
                            vonNeumannProbes.splice(vi, 1);
                            continue;
                        }
                        vn.currentTheta = vn.targetTheta;
                        vn.currentPhi = vn.targetPhi;
                        vn.needTarget = true;
                    }
                    const p = projectStar({ theta: vn.targetTheta, phi: vn.targetPhi }, vn.layerSpeed, viewRotX, viewRotY);
                    if (p && !isOccludedByHole(p.x, p.y)) {
                        vonNeumannScreenPositions.push({ x: p.x, y: p.y });
                        const pulse = 0.4 + 0.3 * Math.sin(now * 0.005 + vi * 2);
                        starsCtx.fillStyle = `rgba(160, 255, 180, ${pulse})`;
                        starsCtx.beginPath();
                        starsCtx.arc(p.x, p.y, 3 * dpr, 0, Math.PI * 2);
                        starsCtx.fill();
                    }
                    continue;
                }

                // Traveling
                const hopT = Math.min(1, (now - vn.hopStart) / vn.hopDuration);
                const theta = vn.currentTheta + (vn.targetTheta - vn.currentTheta) * hopT;
                const phi = vn.currentPhi + (vn.targetPhi - vn.currentPhi) * hopT;

                const proj = projectStar({ theta, phi }, vn.layerSpeed, viewRotX, viewRotY);
                if (proj && !isOccludedByHole(proj.x, proj.y)) {
                    let alpha = 0.8;
                    if (hopT < 0.05) alpha *= hopT / 0.05;
                    if (hopT > 0.95) alpha *= (1 - hopT) / 0.05;

                    vonNeumannScreenPositions.push({ x: proj.x, y: proj.y });

                    starsCtx.fillStyle = `rgba(160, 255, 180, ${alpha})`;
                    starsCtx.beginPath();
                    starsCtx.arc(proj.x, proj.y, 1.2 * dpr, 0, Math.PI * 2);
                    starsCtx.fill();

                    const trailSteps = 4;
                    for (let i = 1; i <= trailSteps; i++) {
                        const tt = Math.max(0, hopT - i * 0.02);
                        const tTheta = vn.currentTheta + (vn.targetTheta - vn.currentTheta) * tt;
                        const tPhi = vn.currentPhi + (vn.targetPhi - vn.currentPhi) * tt;
                        const tp = projectStar({ theta: tTheta, phi: tPhi }, vn.layerSpeed, viewRotX, viewRotY);
                        if (tp) {
                            starsCtx.fillStyle = `rgba(160, 255, 180, ${alpha * (1 - i / trailSteps) * 0.3})`;
                            starsCtx.beginPath();
                            starsCtx.arc(tp.x, tp.y, 0.8 * dpr, 0, Math.PI * 2);
                            starsCtx.fill();
                        }
                    }
                }

                if (hopT >= 1) {
                    vn.pausing = true;
                    vn.pauseUntil = now + 2000 + Math.random() * 2000;
                }
            }
        }

        // ── Dyson Swarm — tiny orbiting dots around a host star ──
        function drawDysonSwarm(now, w, h, isDark, viewRotX, viewRotY) {
            if (!isDark || !dysonSwarmStar) return;
            const star = starLayers[dysonSwarmStar.layerIdx].stars[dysonSwarmStar.starIdx];
            if (!star || star.dead) return;
            const p = projectStar(star, starLayers[dysonSwarmStar.layerIdx].speed, viewRotX, viewRotY);
            if (!p || isOccludedByHole(p.x, p.y)) { dysonScreenPos = null; return; }
            const dpr = window.devicePixelRatio;
            dysonScreenPos = { x: p.x, y: p.y };

            // Draw the host star slightly dimmed with periodic eclipses
            const eclipse = 0.6 + 0.4 * Math.abs(Math.sin(now * 0.0008));
            starsCtx.fillStyle = `rgba(255, 220, 150, ${0.7 * eclipse})`;
            starsCtx.beginPath();
            starsCtx.arc(p.x, p.y, 2.2 * dpr, 0, Math.PI * 2);
            starsCtx.fill();

            // Orbiting swarm particles
            const swarmCount = 12;
            const orbitR = 6 * dpr;
            for (let i = 0; i < swarmCount; i++) {
                const angle = now * 0.002 + (i / swarmCount) * Math.PI * 2;
                const wobble = Math.sin(now * 0.001 + i * 1.7) * 1.5 * dpr;
                const rx = orbitR + wobble;
                const ry = (orbitR + wobble) * 0.35; // elliptical
                const dx = Math.cos(angle) * rx;
                const dy = Math.sin(angle) * ry;
                const alpha = 0.4 + 0.3 * Math.sin(now * 0.003 + i);
                starsCtx.fillStyle = `rgba(255, 200, 100, ${alpha})`;
                starsCtx.beginPath();
                starsCtx.arc(p.x + dx, p.y + dy, 0.6 * dpr, 0, Math.PI * 2);
                starsCtx.fill();
            }

            // Faint golden halo
            starsCtx.strokeStyle = `rgba(255, 200, 80, 0.08)`;
            starsCtx.lineWidth = 0.5 * dpr;
            starsCtx.beginPath();
            starsCtx.ellipse(p.x, p.y, orbitR, orbitR * 0.35, 0, 0, Math.PI * 2);
            starsCtx.stroke();
        }

        // ── Ringworld — thin line through a star (edge-on view) ──
        function drawRingworld(now, w, h, isDark, viewRotX, viewRotY) {
            if (!isDark || !ringworldStar) return;
            const star = starLayers[ringworldStar.layerIdx].stars[ringworldStar.starIdx];
            if (!star || star.dead) return;
            const p = projectStar(star, starLayers[ringworldStar.layerIdx].speed, viewRotX, viewRotY);
            if (!p || isOccludedByHole(p.x, p.y)) { ringworldScreenPos = null; return; }
            const dpr = window.devicePixelRatio;
            ringworldScreenPos = { x: p.x, y: p.y };

            // Host star
            starsCtx.fillStyle = `rgba(255, 245, 220, 0.8)`;
            starsCtx.beginPath();
            starsCtx.arc(p.x, p.y, 1.8 * dpr, 0, Math.PI * 2);
            starsCtx.fill();

            // Edge-on ring — thin line through the star with subtle wobble
            const ringLen = 14 * dpr;
            const tilt = Math.sin(now * 0.0003) * 0.15; // very slow wobble
            starsCtx.strokeStyle = `rgba(180, 220, 255, 0.5)`;
            starsCtx.lineWidth = 0.8 * dpr;
            starsCtx.beginPath();
            starsCtx.moveTo(p.x - ringLen * Math.cos(tilt), p.y - ringLen * Math.sin(tilt));
            starsCtx.lineTo(p.x + ringLen * Math.cos(tilt), p.y + ringLen * Math.sin(tilt));
            starsCtx.stroke();

            // Faint inner glow on the ring
            starsCtx.strokeStyle = `rgba(200, 240, 255, 0.15)`;
            starsCtx.lineWidth = 2.5 * dpr;
            starsCtx.beginPath();
            starsCtx.moveTo(p.x - ringLen * 0.7 * Math.cos(tilt), p.y - ringLen * 0.7 * Math.sin(tilt));
            starsCtx.lineTo(p.x + ringLen * 0.7 * Math.cos(tilt), p.y + ringLen * 0.7 * Math.sin(tilt));
            starsCtx.stroke();
        }

        // ── Stellar Engine — a star moving slowly across the sky ──
        function drawStellarEngine(now, w, h, isDark, viewRotX, viewRotY) {
            if (!isDark) return;
            // Update position
            stellarEngine.theta += stellarEngine.dTheta;
            stellarEngine.phi += stellarEngine.dPhi;
            // Wrap
            if (stellarEngine.phi < 0.2) stellarEngine.dPhi = Math.abs(stellarEngine.dPhi);
            if (stellarEngine.phi > Math.PI - 0.2) stellarEngine.dPhi = -Math.abs(stellarEngine.dPhi);

            const p = projectStar(stellarEngine, stellarEngine.layerSpeed, viewRotX, viewRotY);
            if (!p || isOccludedByHole(p.x, p.y)) { stellarEngineScreenPos = null; return; }
            const dpr = window.devicePixelRatio;
            stellarEngineScreenPos = { x: p.x, y: p.y };

            // Star with slight orange tint (hot exhaust side)
            starsCtx.fillStyle = `rgba(255, 200, 140, 0.85)`;
            starsCtx.beginPath();
            starsCtx.arc(p.x, p.y, stellarEngine.size * dpr, 0, Math.PI * 2);
            starsCtx.fill();

            // Thrust trail — faint line behind it
            const trailAngle = Math.atan2(-stellarEngine.dPhi, -stellarEngine.dTheta);
            const trailLen = 12 * dpr;
            const grad = starsCtx.createLinearGradient(
                p.x, p.y,
                p.x + Math.cos(trailAngle) * trailLen,
                p.y + Math.sin(trailAngle) * trailLen
            );
            grad.addColorStop(0, `rgba(255, 150, 50, 0.4)`);
            grad.addColorStop(1, `rgba(255, 150, 50, 0)`);
            starsCtx.strokeStyle = grad;
            starsCtx.lineWidth = 1.5 * dpr;
            starsCtx.beginPath();
            starsCtx.moveTo(p.x, p.y);
            starsCtx.lineTo(p.x + Math.cos(trailAngle) * trailLen, p.y + Math.sin(trailAngle) * trailLen);
            starsCtx.stroke();

            // Faint engine glow
            starsCtx.fillStyle = `rgba(255, 120, 40, 0.15)`;
            starsCtx.beginPath();
            starsCtx.arc(p.x + Math.cos(trailAngle) * 3 * dpr, p.y + Math.sin(trailAngle) * 3 * dpr, 3 * dpr, 0, Math.PI * 2);
            starsCtx.fill();
        }

        // ── Shkadov Shell — half-enclosed star, asymmetric glow ──
        function drawShkadovShell(now, w, h, isDark, viewRotX, viewRotY) {
            if (!isDark || !shkadovStar) return;
            const star = starLayers[shkadovStar.layerIdx].stars[shkadovStar.starIdx];
            if (!star || star.dead) return;
            const p = projectStar(star, starLayers[shkadovStar.layerIdx].speed, viewRotX, viewRotY);
            if (!p || isOccludedByHole(p.x, p.y)) { shkadovScreenPos = null; return; }
            const dpr = window.devicePixelRatio;
            shkadovScreenPos = { x: p.x, y: p.y };

            // Bright side (unshielded) — warm white
            starsCtx.fillStyle = `rgba(255, 250, 230, 0.9)`;
            starsCtx.beginPath();
            starsCtx.arc(p.x, p.y, 2.2 * dpr, 0, Math.PI * 2);
            starsCtx.fill();

            // Asymmetric glow — brighter on one side
            const glowAngle = now * 0.0002; // slow rotation of the shell orientation
            const gx = Math.cos(glowAngle) * 2 * dpr;
            const gy = Math.sin(glowAngle) * 2 * dpr;
            starsCtx.fillStyle = `rgba(255, 240, 180, 0.35)`;
            starsCtx.beginPath();
            starsCtx.arc(p.x + gx, p.y + gy, 4.5 * dpr, 0, Math.PI * 2);
            starsCtx.fill();

            // Dark shell arc on the opposite side
            const shellAngle = glowAngle + Math.PI;
            starsCtx.strokeStyle = `rgba(80, 80, 100, 0.35)`;
            starsCtx.lineWidth = 1.2 * dpr;
            starsCtx.beginPath();
            starsCtx.arc(p.x, p.y, 5 * dpr, shellAngle - 0.8, shellAngle + 0.8);
            starsCtx.stroke();
        }

        // ── Bracewell Probe — drifts slowly through the star field ──
        function updateBracewellProbe(now, w, h, isDark, viewRotX, viewRotY) {
            if (!isDark) return;
            // Slow drift
            bracewellProbe.theta += bracewellProbe.dTheta;
            bracewellProbe.phi += bracewellProbe.dPhi;
            if (bracewellProbe.phi < 0.3) bracewellProbe.dPhi = Math.abs(bracewellProbe.dPhi);
            if (bracewellProbe.phi > Math.PI - 0.3) bracewellProbe.dPhi = -Math.abs(bracewellProbe.dPhi);

            const p = projectStar(bracewellProbe, bracewellProbe.layerSpeed, viewRotX, viewRotY);
            if (!p || isOccludedByHole(p.x, p.y)) { bracewellScreenPos = null; return; }
            const dpr = window.devicePixelRatio;
            bracewellScreenPos = { x: p.x, y: p.y };

            // Probe dot — silver/white with slow pulse
            const pulse = 0.5 + 0.3 * Math.sin(now * 0.003);
            starsCtx.fillStyle = `rgba(200, 220, 255, ${pulse})`;
            starsCtx.beginPath();
            starsCtx.arc(p.x, p.y, 1.3 * dpr, 0, Math.PI * 2);
            starsCtx.fill();

            // Periodic transmission ping — expanding ring every 4s
            const pingPhase = (now % 4000) / 4000;
            if (pingPhase < 0.5) {
                const ringR = pingPhase * 16 * dpr;
                const ringAlpha = (1 - pingPhase * 2) * 0.3;
                starsCtx.strokeStyle = `rgba(180, 200, 255, ${ringAlpha})`;
                starsCtx.lineWidth = 0.5 * dpr;
                starsCtx.beginPath();
                starsCtx.arc(p.x, p.y, ringR, 0, Math.PI * 2);
                starsCtx.stroke();
            }
        }

        // ── SETI Hit — star pulsing at hydrogen line timing ──
        function drawSetiHit(now, w, h, isDark, viewRotX, viewRotY) {
            if (!isDark || !setiStar) return;
            const star = starLayers[setiStar.layerIdx].stars[setiStar.starIdx];
            if (!star || star.dead) return;
            const p = projectStar(star, starLayers[setiStar.layerIdx].speed, viewRotX, viewRotY);
            if (!p || isOccludedByHole(p.x, p.y)) { setiScreenPos = null; return; }
            const dpr = window.devicePixelRatio;
            setiScreenPos = { x: p.x, y: p.y };

            // Hydrogen line pattern: short-short-long pulse (like meaningful signal)
            const cycle = now % 3000;
            let pulse = 0.3;
            if (cycle < 200) pulse = 1.0;          // short
            else if (cycle > 400 && cycle < 600) pulse = 1.0;  // short
            else if (cycle > 900 && cycle < 1400) pulse = 0.9;  // long
            else if (cycle > 1600 && cycle < 1800) pulse = 1.0;  // short
            else if (cycle > 2000 && cycle < 2200) pulse = 1.0;  // short
            else if (cycle > 2400 && cycle < 2900) pulse = 0.9;  // long

            // Star with greenish tint when pulsing
            const r = Math.round(100 + pulse * 50);
            const g = Math.round(200 + pulse * 55);
            const b = Math.round(100 + pulse * 80);
            starsCtx.fillStyle = `rgba(${r}, ${g}, ${b}, ${0.4 + pulse * 0.5})`;
            starsCtx.beginPath();
            starsCtx.arc(p.x, p.y, (1.5 + pulse * 1.2) * dpr, 0, Math.PI * 2);
            starsCtx.fill();

            // Signal ring when pulsing
            if (pulse > 0.5) {
                starsCtx.strokeStyle = `rgba(100, 255, 140, ${(pulse - 0.5) * 0.3})`;
                starsCtx.lineWidth = 0.5 * dpr;
                starsCtx.beginPath();
                starsCtx.arc(p.x, p.y, (3 + pulse * 3) * dpr, 0, Math.PI * 2);
                starsCtx.stroke();
            }
        }

        // ── Space Elevator — vertical line extending from a star with climbing car ──
        function drawSpaceElevator(now, w, h, isDark, viewRotX, viewRotY) {
            if (!isDark || !spaceElevatorStar) return;
            const star = starLayers[spaceElevatorStar.layerIdx].stars[spaceElevatorStar.starIdx];
            if (!star || star.dead) return;
            const p = projectStar(star, starLayers[spaceElevatorStar.layerIdx].speed, viewRotX, viewRotY);
            if (!p || isOccludedByHole(p.x, p.y)) { spaceElevatorScreenPos = null; return; }
            const dpr = window.devicePixelRatio;
            spaceElevatorScreenPos = { x: p.x, y: p.y };

            // Host star
            starsCtx.fillStyle = `rgba(255, 240, 220, 0.75)`;
            starsCtx.beginPath();
            starsCtx.arc(p.x, p.y, 1.8 * dpr, 0, Math.PI * 2);
            starsCtx.fill();

            // Tether — thin vertical line extending upward
            const tetherLen = 22 * dpr;
            starsCtx.strokeStyle = `rgba(180, 200, 220, 0.3)`;
            starsCtx.lineWidth = 0.6 * dpr;
            starsCtx.beginPath();
            starsCtx.moveTo(p.x, p.y);
            starsCtx.lineTo(p.x, p.y - tetherLen);
            starsCtx.stroke();

            // Counterweight at top
            starsCtx.fillStyle = `rgba(180, 200, 220, 0.4)`;
            starsCtx.beginPath();
            starsCtx.arc(p.x, p.y - tetherLen, 0.8 * dpr, 0, Math.PI * 2);
            starsCtx.fill();

            // Climbing car — oscillates up and down the tether
            const carT = (Math.sin(now * 0.0006) + 1) / 2; // 0→1→0
            const carY = p.y - carT * tetherLen;
            starsCtx.fillStyle = `rgba(255, 220, 120, 0.8)`;
            starsCtx.beginPath();
            starsCtx.arc(p.x, carY, 1.0 * dpr, 0, Math.PI * 2);
            starsCtx.fill();

            // Faint glow around car
            starsCtx.fillStyle = `rgba(255, 220, 120, 0.15)`;
            starsCtx.beginPath();
            starsCtx.arc(p.x, carY, 2.5 * dpr, 0, Math.PI * 2);
            starsCtx.fill();
        }

        // ── Generation Ship — large slow vessel, visible rotating habitat ring ──
        function updateGenShip(now, w, h, isDark, viewRotX, viewRotY) {
            if (!isDark) return;

            // Spawn
            if (!genShip && now > genShipSpawnTime) {
                const from = pickRandomVisibleStar(viewRotX, viewRotY);
                const to = pickRandomVisibleStar(viewRotX, viewRotY);
                if (from && to && from.starIdx !== to.starIdx) {
                    genShip = {
                        fromTheta: from.star.theta, fromPhi: from.star.phi,
                        toTheta: to.star.theta, toPhi: to.star.phi,
                        layerSpeed: starLayers[from.layerIdx].speed,
                        born: now,
                        duration: 120000 + Math.random() * 60000, // 2-3 minutes
                    };
                }
            }

            if (!genShip) { genShipScreenPos = null; return; }
            const age = now - genShip.born;
            if (age > genShip.duration) {
                genShip = null; genShipScreenPos = null;
                genShipSpawnTime = now + 60000 + Math.random() * 90000;
                return;
            }

            const dpr = window.devicePixelRatio;
            const t = age / genShip.duration;
            const theta = genShip.fromTheta + (genShip.toTheta - genShip.fromTheta) * t;
            const phi = genShip.fromPhi + (genShip.toPhi - genShip.fromPhi) * t;

            const p = projectStar({ theta, phi }, genShip.layerSpeed, viewRotX, viewRotY);
            if (!p || isOccludedByHole(p.x, p.y)) { genShipScreenPos = null; return; }

            genShipScreenPos = { x: p.x, y: p.y };

            // Fade in/out
            let alpha = 0.85;
            if (t < 0.03) alpha *= t / 0.03;
            if (t > 0.97) alpha *= (1 - t) / 0.03;

            // Main hull — larger than exodus ships
            starsCtx.fillStyle = `rgba(220, 210, 200, ${alpha})`;
            starsCtx.beginPath();
            starsCtx.arc(p.x, p.y, 1.6 * dpr, 0, Math.PI * 2);
            starsCtx.fill();

            // Rotating habitat ring
            const ringAngle = now * 0.003;
            const ringR = 4.5 * dpr;
            starsCtx.strokeStyle = `rgba(200, 190, 180, ${alpha * 0.5})`;
            starsCtx.lineWidth = 0.7 * dpr;
            starsCtx.beginPath();
            starsCtx.ellipse(p.x, p.y, ringR, ringR * 0.3, ringAngle, 0, Math.PI * 2);
            starsCtx.stroke();

            // Running lights — 3 dots on the ring
            for (let i = 0; i < 3; i++) {
                const la = ringAngle + (i / 3) * Math.PI * 2 + now * 0.003;
                const lx = p.x + Math.cos(la) * ringR;
                const ly = p.y + Math.sin(la) * ringR * 0.3;
                starsCtx.fillStyle = `rgba(255, 240, 200, ${alpha * 0.6})`;
                starsCtx.beginPath();
                starsCtx.arc(lx, ly, 0.5 * dpr, 0, Math.PI * 2);
                starsCtx.fill();
            }

            // Engine glow behind the ship
            const dx = genShip.toTheta - genShip.fromTheta;
            const dy = genShip.toPhi - genShip.fromPhi;
            const moveAngle = Math.atan2(-dy, -dx);
            starsCtx.fillStyle = `rgba(100, 180, 255, ${alpha * 0.25})`;
            starsCtx.beginPath();
            starsCtx.arc(p.x + Math.cos(moveAngle) * 3 * dpr, p.y + Math.sin(moveAngle) * 3 * dpr, 2.5 * dpr, 0, Math.PI * 2);
            starsCtx.fill();
        }

        // ── Asteroid Mining — cluster of dots with flashes ──
        function drawAsteroidMining(now, w, h, isDark, viewRotX, viewRotY) {
            if (!isDark || !asteroidMiningStar) return;
            const star = starLayers[asteroidMiningStar.layerIdx].stars[asteroidMiningStar.starIdx];
            if (!star || star.dead) return;
            const p = projectStar(star, starLayers[asteroidMiningStar.layerIdx].speed, viewRotX, viewRotY);
            if (!p || isOccludedByHole(p.x, p.y)) { asteroidMiningScreenPos = null; return; }
            const dpr = window.devicePixelRatio;
            asteroidMiningScreenPos = { x: p.x, y: p.y };

            // Dim asteroid (brownish)
            starsCtx.fillStyle = `rgba(160, 130, 100, 0.6)`;
            starsCtx.beginPath();
            starsCtx.arc(p.x, p.y, 1.6 * dpr, 0, Math.PI * 2);
            starsCtx.fill();

            // Orbiting mining drones — 5 tiny dots
            for (let i = 0; i < 5; i++) {
                const orbitA = now * 0.0015 + (i / 5) * Math.PI * 2;
                const orbitR = (4 + Math.sin(now * 0.001 + i * 2) * 1.5) * dpr;
                const mx = p.x + Math.cos(orbitA) * orbitR;
                const my = p.y + Math.sin(orbitA) * orbitR * 0.5;
                starsCtx.fillStyle = `rgba(200, 200, 210, 0.5)`;
                starsCtx.beginPath();
                starsCtx.arc(mx, my, 0.5 * dpr, 0, Math.PI * 2);
                starsCtx.fill();
            }

            // Periodic mining flash — bright spark every ~2.5s
            const flashCycle = now % 2500;
            if (flashCycle < 150) {
                const flashAlpha = (1 - flashCycle / 150) * 0.8;
                const flashR = (2 + flashCycle / 150 * 5) * dpr;
                // Random offset for the flash
                const flashAngle = Math.floor(now / 2500) * 2.3;
                const flashDist = 3 * dpr;
                const fx = p.x + Math.cos(flashAngle) * flashDist;
                const fy = p.y + Math.sin(flashAngle) * flashDist * 0.5;

                starsCtx.fillStyle = `rgba(255, 240, 180, ${flashAlpha})`;
                starsCtx.beginPath();
                starsCtx.arc(fx, fy, flashR, 0, Math.PI * 2);
                starsCtx.fill();

                // Bright core
                starsCtx.fillStyle = `rgba(255, 255, 240, ${flashAlpha * 0.8})`;
                starsCtx.beginPath();
                starsCtx.arc(fx, fy, flashR * 0.3, 0, Math.PI * 2);
                starsCtx.fill();
            }

            // Faint ore trail — wispy particles drifting away
            for (let i = 0; i < 3; i++) {
                const trailT = ((now * 0.0004 + i * 0.33) % 1);
                const trailR = (6 + trailT * 8) * dpr;
                const trailAngle = i * 2.1 + 0.5;
                const tx = p.x + Math.cos(trailAngle) * trailR;
                const ty = p.y + Math.sin(trailAngle) * trailR * 0.4;
                starsCtx.fillStyle = `rgba(180, 160, 120, ${0.2 * (1 - trailT)})`;
                starsCtx.beginPath();
                starsCtx.arc(tx, ty, 0.4 * dpr, 0, Math.PI * 2);
                starsCtx.fill();
            }
        }

        // ── Rocket Launch — accelerates away from Sol (pale blue dot) ──
        function updateRocketLaunch(now, w, h, isDark, viewRotX, viewRotY) {
            if (!isDark) return;

            // Spawn from Sol
            if (!rocketLaunch && now > rocketNextLaunch && paleBlueDotStar) {
                const sol = starLayers[paleBlueDotStar.layerIdx].stars[paleBlueDotStar.starIdx];
                if (sol) {
                    // Pick a random direction to launch toward
                    const destAngle = Math.random() * Math.PI * 2;
                    const destDist = 0.3 + Math.random() * 0.4;
                    rocketLaunch = {
                        fromTheta: sol.theta, fromPhi: sol.phi,
                        toTheta: sol.theta + Math.cos(destAngle) * destDist,
                        toPhi: sol.phi + Math.sin(destAngle) * destDist,
                        layerSpeed: starLayers[paleBlueDotStar.layerIdx].speed,
                        born: now,
                        duration: 20000 + Math.random() * 15000, // 20-35s
                    };
                }
            }

            if (!rocketLaunch) { rocketScreenPos = null; return; }
            const age = now - rocketLaunch.born;
            if (age > rocketLaunch.duration) {
                rocketLaunch = null; rocketScreenPos = null;
                rocketNextLaunch = now + 50000 + Math.random() * 40000;
                return;
            }

            const dpr = window.devicePixelRatio;
            // Accelerating — ease-in curve
            const rawT = age / rocketLaunch.duration;
            const t = rawT * rawT; // quadratic acceleration
            const theta = rocketLaunch.fromTheta + (rocketLaunch.toTheta - rocketLaunch.fromTheta) * t;
            const phi = rocketLaunch.fromPhi + (rocketLaunch.toPhi - rocketLaunch.fromPhi) * t;

            const p = projectStar({ theta, phi }, rocketLaunch.layerSpeed, viewRotX, viewRotY);
            if (!p || isOccludedByHole(p.x, p.y)) { rocketScreenPos = null; return; }

            rocketScreenPos = { x: p.x, y: p.y };

            // Fade in/out
            let alpha = 0.9;
            if (rawT < 0.05) alpha *= rawT / 0.05;
            if (rawT > 0.85) alpha *= (1 - rawT) / 0.15;

            // Rocket dot
            starsCtx.fillStyle = `rgba(255, 255, 255, ${alpha})`;
            starsCtx.beginPath();
            starsCtx.arc(p.x, p.y, 1.0 * dpr, 0, Math.PI * 2);
            starsCtx.fill();

            // Exhaust plume — bright orange trail
            const trailSteps = 6;
            for (let i = 1; i <= trailSteps; i++) {
                const tt = Math.max(0, rawT - i * 0.015);
                const accT = tt * tt;
                const tTheta = rocketLaunch.fromTheta + (rocketLaunch.toTheta - rocketLaunch.fromTheta) * accT;
                const tPhi = rocketLaunch.fromPhi + (rocketLaunch.toPhi - rocketLaunch.fromPhi) * accT;
                const tp = projectStar({ theta: tTheta, phi: tPhi }, rocketLaunch.layerSpeed, viewRotX, viewRotY);
                if (tp) {
                    const fade = (1 - i / trailSteps);
